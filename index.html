<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zen Flow · 惊恐应对</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;300;400;500&family=Noto+Sans+SC:wght@300;400;500&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root { --tc-rL: 174,199,158; --tc-rBd: 222,232,202; }
  @keyframes dotPop {
    0%   { transform: scale(0.2); opacity: 0; }
    60%  { transform: scale(1.55); }
    100% { transform: scale(1);   opacity: 1; }
  }
  @keyframes lineGrow {
    from { stroke-dashoffset: var(--llen, 300); }
    to   { stroke-dashoffset: 0; }
  }
  @keyframes confettiP {
    0%   { transform: translate(0,0) rotate(0deg); opacity: 1; }
    100% { transform: translate(var(--cx),var(--cy)) rotate(var(--cr)); opacity: 0; }
  }
  @keyframes senseIn {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes itemSlide {
    from { opacity: 0; transform: translateX(-6px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  html, body {
    margin: 0; padding: 0;
    background: #14110E;
    min-height: 100vh;
    font-family: "Noto Sans SC", system-ui, sans-serif;
    color: #E8EDE4;
    overflow-x: hidden;
  }
  * { box-sizing: border-box; }

  .stage {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 40px 20px;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(139,174,144,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 100%, rgba(122,155,116,0.05) 0%, transparent 50%),
      #14110E;
  }

  @keyframes ripple {
    0%   { transform: scale(0.6); opacity: 0; }
    20%  { opacity: 0.8; }
    100% { transform: scale(4.2); opacity: 0; }
  }
  @keyframes float {
    0%   { opacity: 0; transform: translate(0,0); }
    15%  { opacity: 1; }
    100% { opacity: 0; transform: translate(var(--drift),-360px); }
  }
  @keyframes hapticPulse {
    0%   { transform: scale(0.8); opacity: 1; }
    100% { transform: scale(1.7); opacity: 0; }
  }
  @keyframes tick {
    0%   { opacity: 0.3; transform: scale(0.9); }
    100% { opacity: 1; transform: scale(1); }
  }
  @keyframes qFade {
    0%   { opacity: 0; transform: translateY(8px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  @keyframes optIn {
    0%   { opacity: 0; transform: translateY(10px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  @keyframes cardUp {
    0%   { opacity: 0; transform: translateY(18px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    0%   { opacity: 0; }
    100% { opacity: 1; }
  }
  @keyframes pointFadeIn {
    0%   { opacity: 0; transform: translateX(-6px); }
    100% { opacity: 1; transform: translateX(0); }
  }
  @keyframes clickRipple {
    0%   { transform: scale(0); opacity: 0.55; }
    100% { transform: scale(5); opacity: 0; }
  }
  .click-ripple {
    position: fixed; pointer-events: none; z-index: 9999;
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(var(--tc-rL), 0.3);
    border: 1px solid rgba(var(--tc-rL), 0.5);
    animation: clickRipple 0.55s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
    transform-origin: center;
  }

  /* Tweaks panel */
  .tweaks-panel {
    position: fixed; right: 24px; bottom: 24px; z-index: 1000;
    width: 300px;
    background: rgba(20,28,24,0.92);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(196,218,178,0.18);
    border-radius: 16px;
    padding: 18px 18px 16px;
    color: #E8EDE4;
    font-family: "Noto Sans SC", system-ui, sans-serif;
    box-shadow: 0 30px 60px rgba(0,0,0,0.4);
    display: none;
  }
  .tweaks-panel.active { display: block; }
  .tweaks-panel h3 {
    margin: 0 0 14px; font-size: 11px; letter-spacing: 0.22em;
    color: rgba(196,218,178,0.85); text-transform: uppercase;
    font-family: "JetBrains Mono", ui-monospace, monospace; font-weight: 400;
  }
  .tw-row { margin-bottom: 14px; }
  .tw-row:last-child { margin-bottom: 0; }
  .tw-label {
    display: flex; justify-content: space-between;
    font-size: 12px; color: rgba(232,237,228,0.75); margin-bottom: 6px;
  }
  .tw-label b { font-family: "JetBrains Mono", ui-monospace, monospace; font-weight: 400; color: #C4DAB2; }
  .tw-row input[type="range"] { width: 100%; accent-color: #AEC79E; height: 4px; }
  .tw-row button.tw-btn {
    width: 100%;
    background: rgba(232,237,228,0.06);
    border: 1px solid rgba(232,237,228,0.15);
    color: #E8EDE4; border-radius: 8px; padding: 8px 10px;
    font-family: "Noto Sans SC", system-ui, sans-serif; font-size: 12px; cursor: pointer;
  }
  .tw-presets { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .tw-preset {
    background: rgba(232,237,228,0.04);
    border: 1px solid rgba(232,237,228,0.1);
    color: rgba(232,237,228,0.8); border-radius: 8px; padding: 8px 6px;
    font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 11px;
    cursor: pointer; transition: all 0.2s;
  }
  .tw-preset.active {
    background: rgba(174,199,158,0.15);
    border-color: rgba(174,199,158,0.5); color: #E8F0D8;
  }
  .tw-note { font-size: 10.5px; color: rgba(232,237,228,0.4); line-height: 1.5; margin-top: 10px; font-family: "JetBrains Mono", ui-monospace, monospace; letter-spacing: 0.04em; }
  .tw-constraint { font-size: 10.5px; color: rgba(220,180,100,0.7); line-height: 1.5; margin-top: 6px; font-family: "JetBrains Mono", ui-monospace, monospace; }
  .tweaks-toggle {
    position: fixed; right: 24px; bottom: 24px; z-index: 999;
    padding: 8px 16px;
    background: rgba(174,199,158,0.1); border: 1px solid rgba(196,218,178,0.2);
    border-radius: 999px; color: rgba(196,218,178,0.7);
    font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 10.5px; letter-spacing: 0.18em; text-transform: uppercase;
    cursor: pointer; backdrop-filter: blur(8px);
  }
</style>
</head>
<body>
<div class="stage"><div id="app"></div></div>

<button class="tweaks-toggle" id="tweaks-toggle-btn">Tweaks</button>
<div class="tweaks-panel" id="tweaks">
  <h3>Tweaks · 可调节</h3>
  <div class="tw-row">
    <div class="tw-label">呼吸节奏预设 <b id="tw-preset-label">4-7-8</b></div>
    <div class="tw-presets">
      <button class="tw-preset" data-preset="4-7-8">4 - 7 - 8</button>
      <button class="tw-preset" data-preset="4-4-4">4 - 4 - 4</button>
      <button class="tw-preset" data-preset="4-2-6">4 - 2 - 6</button>
      <button class="tw-preset" data-preset="custom">自定义</button>
    </div>
  </div>
  <div class="tw-row">
    <div class="tw-label">吸气 Inhale <b><span id="tw-inhale-v">4</span>s</b></div>
    <input type="range" id="tw-inhale" min="2" max="10" step="1" value="4"/>
  </div>
  <div class="tw-row">
    <div class="tw-label">屏息 Hold <b><span id="tw-hold-v">7</span>s</b></div>
    <input type="range" id="tw-hold" min="0" max="12" step="1" value="7"/>
  </div>
  <div class="tw-row">
    <div class="tw-label">呼气 Exhale <b><span id="tw-exhale-v">8</span>s</b></div>

  </div>
  <div class="tw-constraint" id="tw-constraint-note">规则：呼气必须比吸气长至少 2 秒</div>
  <div class="tw-row" style="margin-top:10px">

  <div class="tw-note">节奏改动实时生效并保存。</div>
</div>

<script>
  window.__TWEAKS = { inhale:4, hold:7, exhale:8, noise:false };
</script>

window.parseExcelToConfig = function(arrayBuffer) {
  const wb = XLSX.read(new Uint8Array(arrayBuffer), { type: 'array' });
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws);
  const config = {};
  for (const row of rows) {
    const cycle = parseInt(row['循环']);
    if (isNaN(cycle)) continue;
    const title = (row['大标题'] || '').trim();
    const point = (row['小文字'] || '').trim();
    const phase = parseInt(row['分段']) || 4;
    if (!config[cycle]) config[cycle] = { title, warning: title.startsWith('⚠'), points: [] };
    if (point) config[cycle].points.push({ text: point, phase });
  }
  if (Object.keys(config).length === 0) throw new Error('未读取到有效数据，请检查列名：ID、循环、大标题、小文字');
  return config;
};

window.parseCopyExcel = function(arrayBuffer) {
  const wb = XLSX.read(new Uint8Array(arrayBuffer), { type: 'array' });
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws);
  const copy = {};
  for (const r of rows) {
    const key = (r['KEY'] || '').toString().trim();
    const val = (r['VALUE'] !== undefined ? r['VALUE'] : '').toString().trim();
    if (key && val) copy[key] = val;
  }
  if (Object.keys(copy).length === 0) throw new Error('未读取到有效数据，请检查列名：KEY、VALUE');
  return copy;
};

<script type="text/babel">

<script type="text/babel">

<script type="text/babel">
// Educational card component
// points: Array of { text: string, phase: 1|2|3|4 } or plain strings (legacy)
// currentPhase: 'inhale' | 'hold' | 'exhale' | null (null = show all)
function EduCard({ title, points, warning=false, children, animate=true, currentPhase=null }) {
  const phaseNum = currentPhase === 'inhale' ? 1 : currentPhase === 'hold' ? 2 : currentPhase === 'exhale' ? 3 : null;

  // Determine visibility for each point; always keep a stable DOM list (opacity transition)
  const allPoints = (points || []).map((p, i) => {
    const isObj = typeof p === 'object' && p !== null;
    const text  = isObj ? p.text  : p;
    const ph    = isObj ? p.phase : 4;
    const visible = ph === 4 || phaseNum === null || ph === phaseNum;
    return { text, ph, visible, i };
  });

  // If nothing at all is visible (edge case), show title only
  const anyVisible = allPoints.some(p => p.visible);

  return (
    <div style={{
      background: warning ? 'rgba(220,160,60,0.08)' : 'rgba(174,199,158,0.07)',
      border: `1px solid ${warning ? 'rgba(220,160,60,0.25)' : 'rgba(196,218,178,0.15)'}`,
      borderRadius: 16, padding: '16px 18px',
      animation: animate ? 'cardUp 0.5s ease-out both' : 'none',
    }}>
      <div style={{
        fontFamily: '"Noto Serif SC", serif', fontSize: 15, fontWeight: 400,
        color: warning ? 'rgba(220,180,100,0.95)' : '#E8F0D8',
        marginBottom: anyVisible ? 12 : 0, letterSpacing: '0.03em',
      }}>{title}</div>
      {allPoints.map(({ text, visible, i, ph }) => (
        <div key={i} style={{
          display: 'flex', gap: 10, alignItems: 'flex-start',
          maxHeight: visible ? '120px' : '0px',
          opacity: visible ? 1 : 0,
          overflow: 'hidden',
          marginBottom: visible ? 9 : 0,
          transition: 'opacity 0.4s ease, max-height 0.4s ease, margin-bottom 0.3s ease',
        }}>
          <div style={{
            width: 4, height: 4, borderRadius: '50%', flexShrink: 0, marginTop: 7,
            background: warning ? 'rgba(220,160,60,0.6)' : 'rgba(196,218,178,0.5)',
          }}/>
          <div style={{fontSize: 12.5, lineHeight: 1.65, color: 'rgba(232,237,228,0.78)', fontWeight: 300}}>{text}</div>
        </div>
      ))}
      {children}
    </div>
  );
}

// Inline rhythm adjuster for the onboarding screen
function InlineRhythmAdjuster() {
  const [inhale, setInhale] = React.useState(window.__TWEAKS.inhale);
  const [hold, setHold]     = React.useState(window.__TWEAKS.hold);
  const [exhale, setExhale] = React.useState(window.__TWEAKS.exhale);
  const [constrained, setConstrained] = React.useState(false);

  const push = (i, h, e) => {
    const safeE = Math.max(e, i + 2);
    if (safeE !== e) setConstrained(true); else setConstrained(false);
    Object.assign(window.__TWEAKS, { inhale: i, hold: h, exhale: safeE });
    setExhale(safeE);
    window.dispatchEvent(new Event('tweaks-updated'));
  };

  const presets = [
    { label: '3-4-5', v: [3,4,5] },
    { label: '4-5-7', v: [4,5,7] },
    { label: '4-7-8', v: [4,7,8] },
  ];

  const sliderStyle = { width:'100%', accentColor:'#AEC79E', height:4 };
  const labelStyle = { display:'flex', justifyContent:'space-between', fontSize:11.5, color:'rgba(232,237,228,0.6)', marginBottom:5 };

  return (
    <div style={{ marginTop: 14, padding: '14px 16px', background: 'rgba(232,237,228,0.04)', borderRadius: 12, border: '1px solid rgba(232,237,228,0.1)' }}>
      <div style={{ fontFamily:'"JetBrains Mono",ui-monospace,monospace', fontSize:10, letterSpacing:'0.2em', color:'rgba(196,218,178,0.6)', textTransform:'uppercase', marginBottom:12 }}>调整节奏</div>

      {/* Presets */}
      <div style={{ display:'flex', gap:6, marginBottom:14 }}>
        {presets.map(p => {
          const active = inhale===p.v[0] && hold===p.v[1] && exhale===p.v[2];
          return (
            <button key={p.label} onClick={() => { setInhale(p.v[0]); setHold(p.v[1]); setExhale(p.v[2]); setConstrained(false); push(p.v[0],p.v[1],p.v[2]); }} style={{
              flex:1, padding:'7px 4px', borderRadius:8, cursor:'pointer', fontSize:11,
              fontFamily:'"JetBrains Mono",ui-monospace,monospace',
              background: active ? 'rgba(174,199,158,0.18)' : 'rgba(232,237,228,0.04)',
              border: active ? '1px solid rgba(196,218,178,0.45)' : '1px solid rgba(232,237,228,0.1)',
              color: active ? '#E8F0D8' : 'rgba(232,237,228,0.65)',
            }}>{p.label}</button>
          );
        })}
      </div>

      {/* Sliders */}
      <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
        <div>
          <div style={labelStyle}><span>吸气 Inhale</span><b style={{fontFamily:'"JetBrains Mono",monospace',color:'#C4DAB2'}}>{inhale}s</b></div>
          <input type="range" min="2" max="8" step="1" value={inhale} style={sliderStyle} onChange={e=>{ const v=+e.target.value; setInhale(v); push(v,hold,exhale); }}/>
        </div>
        <div>
          <div style={labelStyle}><span>屏息 Hold</span><b style={{fontFamily:'"JetBrains Mono",monospace',color:'#C4DAB2'}}>{hold}s</b></div>
          <input type="range" min="0" max="10" step="1" value={hold} style={sliderStyle} onChange={e=>{ const v=+e.target.value; setHold(v); push(inhale,v,exhale); }}/>
        </div>
        <div>
          <div style={labelStyle}><span>呼气 Exhale</span><b style={{fontFamily:'"JetBrains Mono",monospace',color:'#C4DAB2'}}>{exhale}s</b></div>
          <input type="range" min="4" max="12" step="1" value={exhale} style={sliderStyle} onChange={e=>{ const v=+e.target.value; const safe=Math.max(v,inhale+2); setExhale(safe); push(inhale,hold,safe); if(safe!==v) setConstrained(true); else setConstrained(false); }}/>
        </div>
      </div>
      {constrained && (
        <div style={{ marginTop:8, fontSize:11, color:'rgba(220,175,80,0.8)', fontFamily:'"JetBrains Mono",monospace', lineHeight:1.5 }}>
          ↑ 呼气已自动调整：必须比吸气长至少 2 秒
        </div>
      )}
    </div>
  );
}

function OnboardingBreathScreen({ onComplete }) {
  // Live tutorial config (updated when user imports Excel)
  const [tutConfig, setTutConfig] = React.useState(window.TUTORIAL_CONFIG);
  React.useEffect(() => {
    const h = () => setTutConfig({...window.TUTORIAL_CONFIG});
    window.addEventListener('tutorial-config-updated', h);
    return () => window.removeEventListener('tutorial-config-updated', h);
  }, []);

  // Sync rhythm from global tweaks
  const [twVer, setTwVer] = React.useState(0);
  React.useEffect(() => {
    const h = () => setTwVer(v => v+1);
    window.addEventListener('tweaks-updated', h);
    return () => window.removeEventListener('tweaks-updated', h);
  }, []);
  const inhale = window.__TWEAKS.inhale;
  const hold   = window.__TWEAKS.hold;
  const exhale = window.__TWEAKS.exhale;
  const cycleTotal = inhale + hold + exhale;

  // Breath timer
  const [elapsed, setElapsed]     = React.useState(0);
  const [cycleCount, setCycleCount] = React.useState(0);
  const [exhaleSeed, setExhaleSeed] = React.useState(0);
  const [countdown, setCountdown] = React.useState(3);

  React.useEffect(() => {
    if (countdown <= 0) return;
    const id = setTimeout(() => setCountdown(c => c-1), 1000);
    return () => clearTimeout(id);
  }, [countdown]);

  React.useEffect(() => {
    if (countdown > 0) return;
    let raf, last = performance.now();
    const tick = t => {
      const dt = (t - last) / 1000; last = t;
      setElapsed(prev => {
        const next = prev + dt;
        if (next >= cycleTotal) { setCycleCount(c => c+1); return next - cycleTotal; }
        return next;
      });
      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [cycleTotal, countdown]);

  // Phase
  let phase, phaseProgress, phaseLabel, phaseHint, phaseColor, remain;
  if (elapsed < inhale) {
    phase='inhale'; phaseProgress=elapsed/inhale;
    phaseLabel='吸气'; phaseHint='慢慢吸入，感受胸腔向外扩张';
    phaseColor='rgba(174,199,158,0.85)'; remain=Math.ceil(inhale-elapsed);
  } else if (elapsed < inhale+hold) {
    phase='hold'; phaseProgress=(elapsed-inhale)/hold;
    phaseLabel='屏息'; phaseHint='平静屏住，让氧气渗入血液';
    phaseColor='rgba(220,185,110,0.85)'; remain=Math.ceil(inhale+hold-elapsed);
  } else {
    phase='exhale'; phaseProgress=(elapsed-inhale-hold)/exhale;
    phaseLabel='呼气'; phaseHint='缓缓呼出，越慢越好';
    phaseColor='rgba(140,185,200,0.85)'; remain=Math.ceil(cycleTotal-elapsed);
  }

  const prevPhase = React.useRef(phase);
  React.useEffect(() => {
    if (prevPhase.current !== 'exhale' && phase === 'exhale') setExhaleSeed(s=>s+1);
    prevPhase.current = phase;
  }, [phase]);

  const eio = t => t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
  const circleScale = phase==='inhale'?0.5+0.5*eio(phaseProgress):phase==='hold'?1.0:1.0-0.5*eio(phaseProgress);
  const bgDark = phase==='hold'?1:phase==='exhale'?0.5-0.3*phaseProgress:0.5+0.5*phaseProgress;
  const bgColor = `rgb(${Math.round(14+(1-bgDark)*8)},${Math.round(22+(1-bgDark)*10)},${Math.round(19+(1-bgDark)*8)})`;

  // Haptic pulse
  const [haptic, setHaptic] = React.useState(0);
  React.useEffect(() => { setHaptic(h=>h+1); }, [phase]);

  // Stage / card logic
  const [stage3Answer, setStage3Answer] = React.useState(null); // null | 'ok' | 'hard'
  const cardStage = stage3Answer !== null ? 'answered' : Math.min(cycleCount, 4);

  // Track card stage transitions for animation key
  const [cardAnimKey, setCardAnimKey] = React.useState(0);
  const prevCardStage = React.useRef(cardStage);
  React.useEffect(() => {
    if (cardStage !== prevCardStage.current) {
      prevCardStage.current = cardStage;
      setCardAnimKey(k => k+1);
    }
  }, [cardStage]);

  const cycleLabel = `循环 ${String(cycleCount+1).padStart(2,'0')}`;

  // Card content — cycles 0-3 driven by TUTORIAL_CONFIG (~/Downloads/zenflow/tutorial.xlsx)
  // Cycle 4 (互动问答) and 'answered' are hardcoded UI — not in the config table.
  const renderCard = () => {
    const key = cardAnimKey;

    // Config-driven cycles 0–3
    if (typeof cardStage === 'number' && cardStage >= 0 && cardStage <= 3) {
      const cfg = tutConfig[cardStage];
      if (!cfg) return null;
      return <EduCard key={key} title={cfg.title} points={cfg.points} warning={cfg.warning} currentPhase={phase}/>;
    }

    if (cardStage === 4) return (
        <div key={key} style={{ animation:'cardUp 0.5s ease-out both' }}>
          <div style={{ background:'rgba(174,199,158,0.07)', border:'1px solid rgba(196,218,178,0.15)', borderRadius:16, padding:'16px 18px' }}>
            <div style={{ fontFamily:'"Noto Serif SC",serif', fontSize:15, fontWeight:400, color:'#E8F0D8', marginBottom:14 }}>
              你觉得跟得上这个节奏吗？
            </div>
            <div style={{ fontSize:12.5, lineHeight:1.65, color:'rgba(232,237,228,0.65)', marginBottom:16, fontWeight:300 }}>
              4-7-8 的屏息阶段对初学者可能有挑战性。诚实评估，我们会帮你调整到最适合的节奏。
            </div>
            <div style={{ display:'flex', gap:10 }}>
              <button onClick={()=>setStage3Answer('ok')} style={{
                flex:1, padding:'10px 12px', borderRadius:10, cursor:'pointer',
                background:'rgba(174,199,158,0.14)', border:'1px solid rgba(196,218,178,0.3)',
                color:'#E8F0D8', fontSize:13, fontFamily:'"Noto Sans SC",system-ui,sans-serif', fontWeight:500,
              }}>✓ 跟得上</button>
              <button onClick={()=>setStage3Answer('hard')} style={{
                flex:1, padding:'10px 12px', borderRadius:10, cursor:'pointer',
                background:'rgba(232,237,228,0.04)', border:'1px solid rgba(232,237,228,0.12)',
                color:'rgba(232,237,228,0.75)', fontSize:13, fontFamily:'"Noto Sans SC",system-ui,sans-serif',
              }}>有点吃力</button>
            </div>
          </div>
        </div>
      );

    if (cardStage === 'answered') return (
        <div key={key} style={{ animation:'cardUp 0.5s ease-out both', display:'flex', flexDirection:'column', gap:10 }}>
          {stage3Answer === 'ok' ? (
            <EduCard animate={false} title="很好，继续保持 ✓" points={[
              '你的神经系统正在适应这个节奏。3-4个循环后，平静感会越来越明显。',
              '可以在主页右上角的 ⚙ 设置中随时调整呼吸时长。记住，呼气永远要比吸气长。',
            ]}/>
          ) : (
            <>
              <EduCard animate={false} title="完全正常，这里帮你调整" points={[
                '4-7-8 对初学者确实有难度——7秒屏息很考验意志力。',
                '可以先从更温和的组合开始，比如 3-4-5 或 4-5-7。记住唯一规则：呼气必须比吸气长至少 2 秒，才能充分激活迷走神经缓解焦虑。',
              ]}/>
              <InlineRhythmAdjuster/>
            </>
          )}
          <button onClick={onComplete} style={{
            marginTop:4, width:'100%', padding:'14px 0', borderRadius:999,
            background:'linear-gradient(180deg,rgba(174,199,158,0.28) 0%,rgba(122,155,116,0.32) 100%)',
            border:'1px solid rgba(222,232,202,0.35)', color:'#F3F7ED',
            fontSize:15, fontWeight:500, letterSpacing:'0.06em', cursor:'pointer',
            fontFamily:'"Noto Sans SC",system-ui,sans-serif',
            boxShadow:'0 0 32px rgba(174,199,158,0.15)',
          }}>
            开始使用 Zen Flow →
          </button>
          <div style={{ textAlign:'center', fontSize:11, color:'rgba(232,237,228,0.3)', fontFamily:'"JetBrains Mono",monospace', letterSpacing:'0.15em' }}>
            主页右上角 ⚙ 可随时调整节奏
          </div>
        </div>
      );
    return null;
  };

  return (
    <div style={{ position:'absolute', inset:0, background:bgColor, color:'#E8EDE4', overflow:'hidden', transition:'background 0.4s ease-out', fontFamily:'"Noto Sans SC",system-ui,sans-serif' }}>
      {/* Ambient glow */}
      <div style={{ position:'absolute', inset:0, background:`radial-gradient(circle at 50% 38%, rgba(139,174,144,${0.1+(phase==='exhale'?0.06:0)}) 0%, transparent 55%)`, transition:'background 0.8s ease', pointerEvents:'none' }}/>
      <NoiseOverlay intensity={0.2}/>

      {/* Countdown overlay */}
      {countdown > 0 && (
        <div style={{ position:'absolute', inset:0, zIndex:50, background:'rgba(14,22,19,0.98)', backdropFilter:'blur(8px)', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:12 }}>
          <div style={{ fontFamily:'"Noto Serif SC",serif', fontSize:14, fontWeight:300, letterSpacing:'0.3em', color:'rgba(232,237,228,0.45)' }}>即将开始</div>
          <div key={countdown} style={{ fontFamily:'"JetBrains Mono",monospace', fontSize:88, fontWeight:200, color:'rgba(174,199,158,0.9)', lineHeight:1, animation:'tick 0.4s ease-out' }}>{countdown}</div>
        </div>
      )}

      {/* Skip button */}
      <div style={{ position:'absolute', top:64, right:20, zIndex:20 }}>
        <button onClick={onComplete} style={{
          background:'rgba(232,237,228,0.05)', border:'1px solid rgba(232,237,228,0.1)',
          borderRadius:999, padding:'7px 14px', color:'rgba(232,237,228,0.45)',
          fontSize:12, cursor:'pointer', fontFamily:'"Noto Sans SC",system-ui,sans-serif',
          backdropFilter:'blur(8px)',
        }}>跳过</button>
      </div>

      {/* Cycle counter */}
      <div style={{ position:'absolute', top:68, left:20, zIndex:20, fontFamily:'"JetBrains Mono",monospace', fontSize:10, letterSpacing:'0.22em', color:'rgba(232,237,228,0.3)', textTransform:'uppercase' }}>
        {cycleLabel}
      </div>

      {/* FX (ripples centered) */}
      <div style={{ position:'absolute', top:0, left:0, right:0, bottom:'44%', display:'flex', alignItems:'center', justifyContent:'center' }}>
        <div style={{ position:'relative', width:220, height:220 }}>
          <Ripples active={phase==='exhale'} seed={exhaleSeed}/>
        </div>
      </div>
      <Particles active={phase==='exhale'} seed={exhaleSeed}/>

      {/* Breathing circle + indicators */}
      <div style={{ position:'absolute', top:0, left:0, right:0, bottom:'44%', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center' }}>
        {/* Circle */}
        <div style={{ position:'relative', width:200, height:200, display:'flex', alignItems:'center', justifyContent:'center' }}>
          {/* outer dashed reference */}
          <div style={{ position:'absolute', inset:0, borderRadius:'50%', border:'1px dashed rgba(196,218,178,0.1)' }}/>
          {/* animated fill circle */}
          <div style={{
            position:'absolute', width:200, height:200, borderRadius:'50%',
            transform:`scale(${circleScale})`,
            background:`radial-gradient(circle, rgba(174,199,158,${0.15+(phase==='hold'?0.08:0)}) 0%, rgba(122,155,116,${0.28+(phase==='hold'?0.08:0)}) 55%, rgba(74,102,78,0.42) 100%)`,
            boxShadow:`0 0 60px rgba(174,199,158,${0.15+(phase==='exhale'?0.1:0)}), inset 0 0 40px rgba(232,237,228,0.06)`,
            border:'1px solid rgba(222,232,202,0.22)', transition:'background 0.3s ease, box-shadow 0.3s ease',
          }}/>
          {/* center text */}
          <div style={{ position:'relative', zIndex:2, display:'flex', flexDirection:'column', alignItems:'center', gap:4 }}>
            <div style={{ fontFamily:'"Noto Serif SC",serif', fontSize:22, fontWeight:300, letterSpacing:'0.12em', color:'#F3F7ED' }}>{phaseLabel}</div>
            <div key={remain+phase} style={{ fontFamily:'"JetBrains Mono",monospace', fontSize:38, fontWeight:200, color:'rgba(243,247,237,0.85)', lineHeight:1, animation:'tick 0.4s ease-out' }}>{remain}</div>
          </div>
        </div>

        {/* Phase hint text */}
        <div style={{ marginTop:12, fontSize:12.5, color:'rgba(232,237,228,0.6)', fontWeight:300, letterSpacing:'0.02em', textAlign:'center' }}>{phaseHint}</div>

        {/* Phase progress bar */}
        <div style={{ marginTop:10, width:160, height:2, background:'rgba(232,237,228,0.08)', borderRadius:1 }}>
          <div style={{ width:`${phaseProgress*100}%`, height:'100%', background:phaseColor, borderRadius:1, transition:'width 0.1s linear' }}/>
        </div>

        {/* Phase pips */}
        <div style={{ display:'flex', gap:6, marginTop:10, alignItems:'center' }}>
          {[['inhale','吸'],['hold','屏'],['exhale','呼']].map(([ph,label])=>(
            <div key={ph} style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:4 }}>
              <div style={{ width:phase===ph?40:14, height:2.5, borderRadius:2, background:phase===ph?phaseColor:'rgba(232,237,228,0.12)', transition:'all 0.5s ease' }}/>
              <div style={{ fontSize:9, fontFamily:'"JetBrains Mono",monospace', letterSpacing:'0.15em', color:phase===ph?'rgba(232,237,228,0.5)':'rgba(232,237,228,0.2)', transition:'color 0.5s' }}>{label}</div>
            </div>
          ))}
        </div>

        {/* Haptic ring */}
        <div style={{ position:'relative', width:28, height:28, marginTop:8 }}>
          <div key={haptic} style={{ position:'absolute', inset:0, borderRadius:'50%', border:'1px solid rgba(196,218,178,0.5)', animation:'hapticPulse 0.8s ease-out', opacity:0 }}/>
          <div style={{ position:'absolute', inset:10, borderRadius:'50%', background:'rgba(196,218,178,0.35)' }}/>
        </div>
      </div>

      {/* Educational card area — bottom 44% */}
      <div style={{ position:'absolute', bottom:0, left:0, right:0, height:'44%', padding:'0 18px 36px', display:'flex', flexDirection:'column', justifyContent:'flex-end', overflowY:'auto' }}>
        {renderCard()}
      </div>
    </div>
  );
}
window.OnboardingBreathScreen = OnboardingBreathScreen;
</script>

<!-- ── settings ──────────────────────────────────────────── -->
<script type="text/babel">
function SettingsScreen({ onBack }) {
  const [inhale, setInhale] = React.useState(window.__TWEAKS.inhale);
  const [hold,   setHold]   = React.useState(window.__TWEAKS.hold);
  const [exhale, setExhale] = React.useState(window.__TWEAKS.exhale);
  const [noise,  setNoise]  = React.useState(window.__TWEAKS.noise);
  const [constrained, setConstrained] = React.useState(false);
  const [importStatus, setImportStatus] = React.useState(null);
  const [importedFromFile, setImportedFromFile] = React.useState(
    !!localStorage.getItem('zenflow:tutorial-config')
  );
  const [copyStatus, setCopyStatus] = React.useState(null);
  const [copyImported, setCopyImported] = React.useState(
    Object.keys(window.APP_COPY).length > 0
  );

  // Clear import status after 4 s
  React.useEffect(() => {
    if (!importStatus) return;
    const id = setTimeout(() => setImportStatus(null), 4000);
    return () => clearTimeout(id);
  }, [importStatus]);
  React.useEffect(() => {
    if (!copyStatus) return;
    const id = setTimeout(() => setCopyStatus(null), 4000);
    return () => clearTimeout(id);
  }, [copyStatus]);

  const push = (i, h, e, n) => {
    const safeE = Math.max(e, i+2);
    if (safeE !== e) setConstrained(true); else setConstrained(false);
    Object.assign(window.__TWEAKS, { inhale:i, hold:h, exhale:safeE, noise:n });
    window.dispatchEvent(new Event('tweaks-updated'));
    return safeE;
  };

  const changeInhale = v => { const e2 = Math.max(exhale, v+2); setInhale(v); setExhale(e2); push(v,hold,e2,noise); };
  const changeHold   = v => { setHold(v); push(inhale,v,exhale,noise); };
  const changeExhale = v => { const safe = push(inhale,hold,v,noise); setExhale(safe); };
  const toggleNoise  = () => { const n=!noise; setNoise(n); push(inhale,hold,exhale,n); setBGM(n); if(n) startBGM(); };

  const presets = [
    { label:'4 - 7 - 8', v:[4,7,8] },
    { label:'4 - 4 - 4', v:[4,4,4] },
    { label:'4 - 2 - 6', v:[4,2,6] },
    { label:'3 - 4 - 5', v:[3,4,5] },
  ];
  const activePreset = presets.find(p=>p.v[0]===inhale&&p.v[1]===hold&&p.v[2]===exhale);

  const sliderBase = { width:'100%', accentColor:'#AEC79E', height:4, cursor:'pointer' };

  return (
    <div style={{ position:'absolute', inset:0, background:'linear-gradient(180deg,#1A2820 0%,#131C17 50%,#0E1613 100%)', color:'#E8EDE4', overflow:'hidden', display:'flex', flexDirection:'column' }}>
      <NoiseOverlay intensity={0.22}/>

      {/* Header */}
      <div style={{ position:'relative', zIndex:2, padding:'66px 22px 0', display:'flex', alignItems:'center', gap:14 }}>
        <button onClick={onBack} style={{ background:'rgba(232,237,228,0.06)', border:'1px solid rgba(232,237,228,0.12)', borderRadius:999, width:36, height:36, cursor:'pointer', color:'rgba(232,237,228,0.7)', display:'flex', alignItems:'center', justifyContent:'center', backdropFilter:'blur(8px)' }}>
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <div>
          <div style={{ fontFamily:'"JetBrains Mono",monospace', fontSize:10, letterSpacing:'0.22em', color:'rgba(196,218,178,0.6)', textTransform:'uppercase' }}>Zen Flow · Settings</div>
          <div style={{ fontFamily:'"Noto Serif SC",serif', fontSize:20, fontWeight:300, color:'#F0F3EA', marginTop:3 }}>呼吸节奏设置</div>
        </div>
      </div>

      {/* Content */}
      <div style={{ flex:1, position:'relative', zIndex:2, overflowY:'auto', padding:'28px 20px 40px' }}>

        {/* Science note */}
        <div style={{ background:'rgba(174,199,158,0.06)', border:'1px solid rgba(196,218,178,0.12)', borderRadius:14, padding:'14px 16px', marginBottom:20 }}>
          <div style={{ fontSize:12, lineHeight:1.7, color:'rgba(232,237,228,0.65)', fontWeight:300 }}>
            <b style={{ color:'rgba(196,218,178,0.85)', fontWeight:400 }}>科学原则：</b>呼气必须比吸气长至少 2 秒，才能充分刺激迷走神经，激活副交感神经系统。这是缓解焦虑的关键机制。
          </div>
        </div>

        {/* Presets */}
        <div style={{ marginBottom:22 }}>
          <div style={{ fontFamily:'"JetBrains Mono",monospace', fontSize:10, letterSpacing:'0.2em', color:'rgba(196,218,178,0.6)', textTransform:'uppercase', marginBottom:12 }}>预设节奏</div>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8 }}>
            {presets.map(p => {
              const isActive = p.v[0]===inhale && p.v[1]===hold && p.v[2]===exhale;
              return (
                <button key={p.label} onClick={()=>{ setInhale(p.v[0]); setHold(p.v[1]); setExhale(p.v[2]); setConstrained(false); push(p.v[0],p.v[1],p.v[2],noise); }} style={{
                  padding:'12px 10px', borderRadius:12, cursor:'pointer',
                  background: isActive ? 'rgba(174,199,158,0.16)' : 'rgba(232,237,228,0.04)',
                  border: isActive ? '1px solid rgba(196,218,178,0.45)' : '1px solid rgba(232,237,228,0.1)',
                  color: isActive ? '#E8F0D8' : 'rgba(232,237,228,0.7)',
                }}>
                  <div style={{ fontFamily:'"JetBrains Mono",monospace', fontSize:13, fontWeight: isActive?400:300, marginBottom:4 }}>{p.label}</div>
                  <div style={{ fontSize:10.5, color:isActive?'rgba(196,218,178,0.7)':'rgba(232,237,228,0.35)', fontFamily:'"Noto Sans SC",sans-serif' }}>
                    {p.v[0]}s 吸 · {p.v[1]}s 屏 · {p.v[2]}s 呼
                  </div>
                </button>
              );
            })}
          </div>
        </div>

        {/* Custom sliders */}
        <div style={{ marginBottom:22 }}>
          <div style={{ fontFamily:'"JetBrains Mono",monospace', fontSize:10, letterSpacing:'0.2em', color:'rgba(196,218,178,0.6)', textTransform:'uppercase', marginBottom:16 }}>
            自定义 {!activePreset && <span style={{ color:'rgba(220,175,80,0.7)' }}>· 当前</span>}
          </div>
          <div style={{ display:'flex', flexDirection:'column', gap:18 }}>
            {/* Inhale */}
            <div>
              <div style={{ display:'flex', justifyContent:'space-between', marginBottom:8 }}>
                <div>
                  <div style={{ fontSize:13, color:'rgba(232,237,228,0.85)' }}>吸气 Inhale</div>
                  <div style={{ fontSize:11, color:'rgba(232,237,228,0.4)', marginTop:2 }}>充分扩张肺泡，氧气进入</div>
                </div>
                <div style={{ fontFamily:'"JetBrains Mono",monospace', fontSize:22, fontWeight:200, color:'#C4DAB2', alignSelf:'center' }}>{inhale}s</div>
              </div>
              <input type="range" min="2" max="8" step="1" value={inhale} style={sliderBase} onChange={e=>changeInhale(+e.target.value)}/>
            </div>
            {/* Hold */}
            <div>
              <div style={{ display:'flex', justifyContent:'space-between', marginBottom:8 }}>
                <div>
                  <div style={{ fontSize:13, color:'rgba(232,237,228,0.85)' }}>屏息 Hold</div>
                  <div style={{ fontSize:11, color:'rgba(232,237,228,0.4)', marginTop:2 }}>氧气渗入血液，触发平静反射</div>
                </div>
                <div style={{ fontFamily:'"JetBrains Mono",monospace', fontSize:22, fontWeight:200, color:'#C4DAB2', alignSelf:'center' }}>{hold}s</div>
              </div>
              <input type="range" min="0" max="10" step="1" value={hold} style={sliderBase} onChange={e=>changeHold(+e.target.value)}/>
            </div>
            {/* Exhale */}
            <div>
              <div style={{ display:'flex', justifyContent:'space-between', marginBottom:8 }}>
                <div>
                  <div style={{ fontSize:13, color:'rgba(232,237,228,0.85)' }}>呼气 Exhale</div>
                  <div style={{ fontSize:11, color:'rgba(232,237,228,0.4)', marginTop:2 }}>激活迷走神经，必须 &gt; 吸气+2s</div>
                </div>
                <div style={{ fontFamily:'"JetBrains Mono",monospace', fontSize:22, fontWeight:200, color:'#C4DAB2', alignSelf:'center' }}>{exhale}s</div>
              </div>
              <input type="range" min="4" max="14" step="1" value={exhale} style={sliderBase} onChange={e=>changeExhale(+e.target.value)}/>
              {constrained && (
                <div style={{ marginTop:7, fontSize:11.5, color:'rgba(220,175,80,0.85)', fontFamily:'"JetBrains Mono",monospace', lineHeight:1.5 }}>
                  ↑ 已自动调整——呼气必须比吸气长至少 2 秒
                </div>
              )}
            </div>
          </div>
        </div>

        {/* Preview */}
        <div style={{ background:'rgba(232,237,228,0.03)', border:'1px solid rgba(232,237,228,0.07)', borderRadius:12, padding:'12px 16px', marginBottom:22 }}>
          <div style={{ fontFamily:'"JetBrains Mono",monospace', fontSize:10, letterSpacing:'0.2em', color:'rgba(196,218,178,0.5)', textTransform:'uppercase', marginBottom:8 }}>当前节奏预览</div>
          <div style={{ display:'flex', gap:0, alignItems:'stretch' }}>
            {[['吸气',inhale,'rgba(174,199,158,0.6)'],['屏息',hold,'rgba(220,185,110,0.6)'],['呼气',exhale,'rgba(140,185,200,0.6)']].map(([label,val,color],i)=>(
              <div key={label} style={{ flex:val, background:color, opacity:0.7+(i===1?0.1:0), display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'8px 4px', borderRadius:i===0?'6px 0 0 6px':i===2?'0 6px 6px 0':'0' }}>
                <div style={{ fontSize:9, fontFamily:'"JetBrains Mono",monospace', color:'rgba(15,20,18,0.8)', letterSpacing:'0.1em' }}>{label}</div>
                <div style={{ fontSize:13, fontFamily:'"JetBrains Mono",monospace', fontWeight:500, color:'rgba(15,20,18,0.9)' }}>{val}s</div>
              </div>
            ))}
          </div>
          <div style={{ marginTop:8, fontSize:11, color:'rgba(232,237,228,0.35)', fontFamily:'"JetBrains Mono",monospace' }}>
            单次循环 {inhale+hold+exhale}s · 每分钟约 {(60/(inhale+hold+exhale)).toFixed(1)} 次
          </div>
        </div>

        {/* Tutorial Excel import */}
        <div style={{ padding:'16px 0', borderTop:'1px solid rgba(232,237,228,0.07)' }}>
          <div style={{ fontFamily:'"JetBrains Mono",monospace', fontSize:10, letterSpacing:'0.2em', color:'rgba(196,218,178,0.6)', textTransform:'uppercase', marginBottom:10 }}>教程内容配置</div>
          <div style={{ fontSize:11.5, color:'rgba(232,237,228,0.45)', lineHeight:1.6, marginBottom:12 }}>
            配置表位于 <span style={{ fontFamily:'"JetBrains Mono",monospace', color:'rgba(196,218,178,0.55)', fontSize:10.5 }}>~/Downloads/zenflow/tutorial.xlsx</span>，编辑后在此导入即时生效。循环 0-3 从表格读取，第 5 循环（互动问答）固定不变。
          </div>
          {importStatus && (
            <div style={{ marginBottom:10, padding:'8px 12px', borderRadius:8, fontSize:11.5, fontFamily:'"JetBrains Mono",monospace',
              background: importStatus.startsWith('✓') ? 'rgba(174,199,158,0.1)' : 'rgba(220,80,80,0.1)',
              border: `1px solid ${importStatus.startsWith('✓') ? 'rgba(174,199,158,0.3)' : 'rgba(220,80,80,0.3)'}`,
              color: importStatus.startsWith('✓') ? 'rgba(196,218,178,0.9)' : 'rgba(220,140,140,0.9)',
            }}>{importStatus}</div>
          )}
          <label style={{ display:'block', cursor:'pointer' }}>
            <input type="file" accept=".xlsx,.xls" style={{ display:'none' }} onChange={e => {
              const file = e.target.files[0]; if (!file) return;
              const reader = new FileReader();
              reader.onload = evt => {
                try {
                  const config = window.parseExcelToConfig(evt.target.result);
                  window.saveTutorialConfig(config);
                  setImportedFromFile(true);
                  setImportStatus(`✓ 已导入 ${Object.keys(config).length} 张卡片 · ${file.name}`);
                } catch(err) { setImportStatus('✗ 解析失败：' + err.message); }
              };
              reader.readAsArrayBuffer(file);
              e.target.value = '';
            }}/>
            <div style={{
              display:'flex', alignItems:'center', justifyContent:'center', gap:8,
              padding:'10px 0', borderRadius:10, cursor:'pointer', fontSize:13,
              background:'rgba(174,199,158,0.08)', border:'1px dashed rgba(196,218,178,0.25)',
              color:'rgba(196,218,178,0.75)', fontFamily:'"Noto Sans SC",system-ui,sans-serif',
              transition:'all 0.2s',
            }}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              导入 tutorial.xlsx
            </div>
          </label>
          {importedFromFile && (
            <button onClick={() => { window.saveTutorialConfig(window.TUTORIAL_EMBEDDED); setImportStatus('↩ 已重置为内建内容'); setImportedFromFile(false); }} style={{
              marginTop:8, width:'100%', padding:'8px 0', borderRadius:8, cursor:'pointer', fontSize:11.5,
              background:'transparent', border:'1px solid rgba(232,237,228,0.08)', color:'rgba(232,237,228,0.35)',
              fontFamily:'"Noto Sans SC",system-ui,sans-serif',
            }}>重置为默认内容</button>
          )}
        </div>

        {/* copy.xlsx import */}
        <div style={{ padding:'16px 0', borderTop:'1px solid rgba(232,237,228,0.07)' }}>
          <div style={{ fontSize:13, color:'rgba(232,237,228,0.85)', marginBottom:4 }}>文案配置</div>
          <div style={{ fontSize:11.5, color:'rgba(232,237,228,0.45)', lineHeight:1.6, marginBottom:12 }}>
            配置表位于 <span style={{ fontFamily:'"JetBrains Mono",monospace', color:'rgba(196,218,178,0.55)', fontSize:10.5 }}>~/Downloads/zenflow/copy.xlsx</span>，编辑 VALUE 列后刷新页面即时生效。也可在此手动导入覆盖。
          </div>
          {copyStatus && (
            <div style={{ marginBottom:10, padding:'8px 12px', borderRadius:8, fontSize:11.5, fontFamily:'"JetBrains Mono",monospace',
              background: copyStatus.startsWith('✓') ? 'rgba(174,199,158,0.1)' : 'rgba(220,80,80,0.1)',
              border: `1px solid ${copyStatus.startsWith('✓') ? 'rgba(174,199,158,0.3)' : 'rgba(220,80,80,0.3)'}`,
              color: copyStatus.startsWith('✓') ? 'rgba(196,218,178,0.9)' : 'rgba(220,140,140,0.9)',
            }}>{copyStatus}</div>
          )}
          <label style={{ display:'block', cursor:'pointer' }}>
            <input type="file" accept=".xlsx,.xls" style={{ display:'none' }} onChange={e => {
              const file = e.target.files[0]; if (!file) return;
              const reader = new FileReader();
              reader.onload = evt => {
                try {
                  const copy = window.parseCopyExcel(evt.target.result);
                  window.saveAppCopy(copy);
                  setCopyImported(true);

                <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>

<!-- ── help (regular, persistent) ────────────────────────── -->
<script type="text/babel">
function HelpScreen({ onExit, rhythm, noise }) {
  const { inhale, hold, exhale } = rhythm;
  const cycleTotal = inhale+hold+exhale;
  const [elapsed,setElapsed]=React.useState(0);
  const [cycleCount,setCycleCount]=React.useState(0);
  const [exhaleSeed,setExhaleSeed]=React.useState(0);
  const [paused,setPaused]=React.useState(false);
  const [countdown,setCountdown]=React.useState(3);
  const [hasBg,setHasBg]=React.useState((window.__BG||'default')!=='default');
  const [bgBright,setBgBright]=React.useState(window.__GROWTH.bgBright??40);
  const [bgBrightEx,setBgBrightEx]=React.useState(window.__GROWTH.bgBrightExhale??60);
  const th=useTheme();
  React.useEffect(()=>{
    const h=()=>setHasBg((window.__BG||'default')!=='default');
    window.addEventListener('bg-updated',h);
    return()=>window.removeEventListener('bg-updated',h);
  },[]);
  React.useEffect(()=>{
    const h=()=>{ setBgBright(window.__GROWTH.bgBright??40); setBgBrightEx(window.__GROWTH.bgBrightExhale??60); };
    window.addEventListener('growth-updated',h);
    return()=>window.removeEventListener('growth-updated',h);
  },[]);

  React.useEffect(()=>{
    if(countdown<=0)return;
    const id=setTimeout(()=>setCountdown(c=>c-1),1000);
    return()=>clearTimeout(id);
  },[countdown]);

  React.useEffect(()=>{
    if(countdown>0)return;
    if(paused)return;
    let raf,last=performance.now();
    const tick=t=>{const dt=(t-last)/1000;last=t;setElapsed(prev=>{const next=prev+dt;if(next>=cycleTotal){setCycleCount(c=>c+1);return next-cycleTotal;}return next;});raf=requestAnimationFrame(tick);};
    raf=requestAnimationFrame(tick); return()=>cancelAnimationFrame(raf);
  },[paused,cycleTotal,countdown]);

  let phase,phaseProgress,phaseLabel,remain;
  if(elapsed<inhale){phase='inhale';phaseProgress=elapsed/inhale;phaseLabel='吸气';remain=Math.ceil(inhale-elapsed);}
  else if(elapsed<inhale+hold){phase='hold';phaseProgress=(elapsed-inhale)/hold;phaseLabel='屏息';remain=Math.ceil(inhale+hold-elapsed);}
  else{phase='exhale';phaseProgress=(elapsed-inhale-hold)/exhale;phaseLabel='呼气';remain=Math.ceil(cycleTotal-elapsed);}

  const prevPhase=React.useRef(phase);
  React.useEffect(()=>{if(prevPhase.current!=='exhale'&&phase==='exhale')setExhaleSeed(s=>s+1);prevPhase.current=phase;},[phase]);

  const eio=t=>t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
  const scale=phase==='inhale'?0.5+0.5*eio(phaseProgress):phase==='hold'?1.0:1.0-0.5*eio(phaseProgress);
  const bgDark=phase==='hold'?1:phase==='exhale'?0.5-0.3*phaseProgress:0.5+0.5*phaseProgress;
  const bgColor=`rgb(${14+(1-bgDark)*8|0},${22+(1-bgDark)*10|0},${19+(1-bgDark)*8|0})`;
  const [haptic,setHaptic]=React.useState(0);
  React.useEffect(()=>{setHaptic(h=>h+1);},[phase]);
  const handleExit=()=>{ const totalSecs=cycleCount*cycleTotal+elapsed; onExit({cycles:cycleCount,totalSecs,cycleTotal,rhythm}); };

  return (
    <div style={{position:'absolute',inset:0,background:hasBg?'transparent':bgColor,color:'#E8EDE4',overflow:'hidden',transition:'background 0.4s ease-out',fontFamily:'"Noto Sans SC",system-ui,sans-serif'}}>
      <BgLayer brightness={(phase==='exhale'?bgBrightEx:bgBright)/100} transitionMs={phase==='exhale'?2000:800}/>
      <div style={{position:'absolute',inset:0,background:`radial-gradient(circle at 50% 50%,rgba(${th.r},${0.12+(phase==='exhale'?0.08:0)}) 0%,transparent 55%)`,transition:'background 0.8s ease'}}/>
      <NoiseOverlay intensity={0.22}/>
      {countdown>0&&(
        <div style={{position:'absolute',inset:0,zIndex:50,background:hasBg?'rgba(10,16,13,0.92)':'rgba(14,22,19,0.98)',backdropFilter:'blur(8px)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:12}}>
          <div style={{fontFamily:'"Noto Serif SC",serif',fontSize:14,fontWeight:300,letterSpacing:'0.3em',color:'rgba(232,237,228,0.45)'}}>即将开始</div>
          <div key={countdown} style={{fontFamily:'"JetBrains Mono",ui-monospace,monospace',fontSize:88,fontWeight:200,color:`rgba(${th.rL},0.9)`,lineHeight:1,animation:'tick 0.4s ease-out'}}>{countdown}</div>
        </div>
      )}
      <div style={{position:'absolute',top:64,left:0,right:0,zIndex:10,padding:'0 24px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <button onClick={handleExit} style={{background:'rgba(232,237,228,0.06)',border:'1px solid rgba(232,237,228,0.12)',borderRadius:999,padding:'8px 14px',color:'rgba(232,237,228,0.75)',fontSize:12,cursor:'pointer',backdropFilter:'blur(8px)',display:'flex',alignItems:'center',gap:6,fontFamily:'"Noto Sans SC",system-ui,sans-serif'}}>
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M15 18l-6-6 6-6"/></svg>结束
        </button>
        <div style={{fontFamily:'"JetBrains Mono",ui-monospace,monospace',fontSize:10.5,letterSpacing:'0.2em',color:'rgba(232,237,228,0.4)',textTransform:'uppercase'}}>cycle · {String(cycleCount+1).padStart(2,'0')}</div>
        <button onClick={()=>setPaused(p=>!p)} style={{background:'rgba(232,237,228,0.06)',border:'1px solid rgba(232,237,228,0.12)',borderRadius:999,width:34,height:34,color:'rgba(232,237,228,0.75)',cursor:'pointer',backdropFilter:'blur(8px)',display:'flex',alignItems:'center',justifyContent:'center'}}>
          {paused?<svg width="10" height="12" viewBox="0 0 10 12"><path d="M1 1l8 5-8 5V1z" fill="currentColor"/></svg>:<svg width="10" height="12" viewBox="0 0 10 12"><rect x="1" y="1" width="2.5" height="10" fill="currentColor"/><rect x="6.5" y="1" width="2.5" height="10" fill="currentColor"/></svg>}
        </button>
      </div>
      <div style={{position:'absolute',top:0,left:0,right:0,bottom:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
        <div style={{position:'relative',width:360,height:360}}><Ripples active={phase==='exhale'} seed={exhaleSeed}/></div>
      </div>
      <Particles active={phase==='exhale'} seed={exhaleSeed}/>
      <div style={{position:'absolute',top:0,left:0,right:0,bottom:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
        <div style={{position:'relative',width:280,height:280,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <div style={{position:'absolute',inset:0,borderRadius:'50%',border:`1px dashed rgba(${th.rL},0.1)`}}/>
          <div style={{position:'absolute',width:280,height:280,borderRadius:'50%',transform:`scale(${scale})`,background:`radial-gradient(circle,rgba(${th.rL},${0.15+(phase==='hold'?0.08:0)}) 0%,rgba(${th.rD},${0.28+(phase==='hold'?0.08:0)}) 55%,rgba(${th.rDk},0.42) 100%)`,boxShadow:`0 0 80px rgba(${th.rL},${0.18+(phase==='exhale'?0.12:0)}),inset 0 0 60px rgba(232,237,228,0.08)`,border:`1px solid rgba(${th.rBd},0.28)`,transition:'background 0.3s ease,box-shadow 0.3s ease'}}/>
          <div style={{position:'relative',zIndex:2,display:'flex',flexDirection:'column',alignItems:'center',gap:6}}>
            <div style={{fontFamily:'"Noto Serif SC",serif',fontSize:28,fontWeight:300,letterSpacing:'0.15em',color:'#F3F7ED'}}>{phaseLabel}</div>
            <div key={remain+phase} style={{fontFamily:'"JetBrains Mono",ui-monospace,monospace',fontSize:44,fontWeight:200,color:'rgba(243,247,237,0.85)',lineHeight:1,animation:'tick 0.4s ease-out'}}>{remain}</div>
            <div style={{fontFamily:'"JetBrains Mono",ui-monospace,monospace',fontSize:9.5,letterSpacing:'0.3em',color:'rgba(232,237,228,0.35)',textTransform:'uppercase',marginTop:2}}>{phase}</div>
          </div>
        </div>
      </div>
      <div style={{position:'absolute',bottom:54,left:0,right:0,display:'flex',flexDirection:'column',alignItems:'center',gap:14}}>
        <div style={{display:'flex',gap:6,alignItems:'center'}}>
          {['inhale','hold','exhale'].map(ph=>(
            <div key={ph} style={{width:phase===ph?48:18,height:3,borderRadius:2,background:phase===ph?`rgba(${th.rL},0.9)`:'rgba(232,237,228,0.15)',transition:'all 0.6s ease'}}/>
          ))}
        </div>
        <div style={{position:'relative',width:44,height:44}}>
          <div key={haptic} style={{position:'absolute',inset:0,borderRadius:'50%',border:`1px solid rgba(${th.rL},0.6)`,animation:'hapticPulse 0.8s ease-out',opacity:0}}/>
          <div style={{position:'absolute',inset:16,borderRadius:'50%',background:`rgba(${th.rL},0.4)`}}/>
        </div>
        <div style={{fontFamily:'"JetBrains Mono",ui-monospace,monospace',fontSize:9.5,letterSpacing:'0.28em',color:'rgba(232,237,228,0.3)',textTransform:'uppercase'}}>
          {inhale}–{hold}–{exhale} · {noise?'bgm on':'silent'}
        </div>
      </div>
    </div>
  );
}
window.HelpScreen=HelpScreen;
</script>

<!-- ── Summary ─────────────────────────────────────────────── -->
<script type="text/babel">
function SummaryScreen({ data, onDone }) {
  const { cycles, totalSecs, cycleTotal, rhythm } = data;
  const th = useTheme();
  const totalR = Math.round(totalSecs);
  const mins = Math.floor(totalR / 60);
  const secs = totalR % 60;
  const partialSecs = totalSecs - cycles * cycleTotal;
  const showPartial = partialSecs > 1.5 && cycles < 20;

  const TIERS = [0,1,2,3,4,5].map((i,_,arr,mins=[0,30,60,180,360,600])=>({
    min:mins[i], title:COPY(`summary.tier${i}.name`), msg:COPY(`summary.tier${i}.msg`),
  }));
  const tierIdx = TIERS.reduce((acc,t,i)=>totalR>=t.min?i:acc, 0);
  const tier = TIERS[tierIdx];
  const circ = 2*Math.PI*28;

  return (
    <div style={{position:'absolute',inset:0,background:'linear-gradient(180deg,#1C2420 0%,#0E1613 100%)',color:'#E8EDE4',overflow:'hidden',display:'flex',flexDirection:'column',fontFamily:'"Noto Sans SC",system-ui,sans-serif',animation:'cardUp 0.5s ease-out'}}>
      <NoiseOverlay intensity={0.2}/>
      <div style={{position:'absolute',top:'28%',left:'50%',transform:'translate(-50%,-50%)',width:420,height:420,borderRadius:'50%',background:`radial-gradient(circle,rgba(${th.r},0.14) 0%,transparent 70%)`,filter:'blur(28px)',pointerEvents:'none'}}/>
      <div style={{position:'relative',zIndex:2,flex:1,display:'flex',flexDirection:'column',padding:'70px 28px 40px'}}>

        {/* Achievement section */}
        <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:14}}>
          {/* Progress ring */}
          <svg width="72" height="72" viewBox="0 0 64 64" style={{overflow:'visible'}}>
            <circle cx="32" cy="32" r="28" fill="none" stroke={`rgba(${th.rL},0.1)`} strokeWidth="2"/>
            <circle cx="32" cy="32" r="28" fill="none" stroke={`rgba(${th.rL},0.8)`} strokeWidth="2"
              strokeDasharray={`${circ * tierIdx/5} ${circ}`} strokeLinecap="round"
              transform="rotate(-90 32 32)" style={{transition:'stroke-dasharray 1.2s ease'}}/>
            <text x="32" y="36" textAnchor="middle" fill={`rgba(${th.rL},0.85)`}
              style={{fontFamily:'"JetBrains Mono",monospace',fontSize:'11px',fontWeight:300}}>
              {tierIdx}/{TIERS.length-1}
            </text>
          </svg>

          {/* Title */}
          <div style={{fontFamily:'"Noto Serif SC",serif',fontSize:26,fontWeight:300,color:'#F0F3EA',letterSpacing:'0.04em',textAlign:'center',animation:'qFade 0.6s ease-out'}}>{tier.title}</div>

          {/* 5-bar tier indicator */}
          <div style={{display:'flex',gap:4,alignItems:'center'}}>
            {TIERS.slice(1).map((_,i)=>(
              <div key={i} style={{width:i<tierIdx?30:18,height:3,borderRadius:2,
                background:i<tierIdx?`rgba(${th.rL},0.8)`:'rgba(232,237,228,0.12)',
                transition:'all 0.5s ease'}}/>
            ))}
          </div>

          {/* Message */}
          <div style={{fontSize:13.5,fontWeight:300,color:'rgba(232,237,228,0.55)',textAlign:'center',lineHeight:1.75,maxWidth:262,animation:'qFade 0.7s ease-out'}}>{tier.msg}</div>
        </div>

        {/* Stats grid */}
        <div style={{display:'flex',borderRadius:16,overflow:'hidden',border:`1px solid rgba(${th.rL},0.1)`}}>
          {[
            {label:'Cycles', val:String(cycles).padStart(2,'0'), small:false},
            {label:'用时',   val:mins>0?`${mins}:${String(secs).padStart(2,'0')}`:`${secs}s`, small:false, sep:true},
            {label:'节奏',   val:`${rhythm.inhale}·${rhythm.hold}·${rhythm.exhale}`, small:true, sep:true},
          ].map(s=>(
            <div key={s.label} style={{flex:1,padding:'16px 8px',background:`rgba(${th.r},0.06)`,textAlign:'center',borderLeft:s.sep?`1px solid rgba(${th.rL},0.08)`:'none'}}>
              <div style={{fontFamily:'"JetBrains Mono",monospace',fontSize:s.small?18:26,fontWeight:200,color:`rgba(${th.rL},0.9)`,lineHeight:1.2}}>{s.val}</div>
              <div style={{fontSize:10,letterSpacing:'0.14em',color:'rgba(232,237,228,0.32)',marginTop:5,textTransform:'uppercase',fontFamily:'"JetBrains Mono",monospace'}}>{s.label}</div>
            </div>
          ))}
        </div>

        {/* Cycle timeline */}
        {(cycles > 0 || showPartial) && (
          <div style={{marginTop:14}}>
            <div style={{fontSize:9.5,letterSpacing:'0.18em',color:'rgba(232,237,228,0.2)',textTransform:'uppercase',marginBottom:7,fontFamily:'"JetBrains Mono",monospace'}}>
              {`cycles · ${cycles}  ·  ${rhythm.inhale}–${rhythm.hold}–${rhythm.exhale} = ${cycleTotal}s each`}
            </div>
            <div style={{display:'flex',gap:3,flexWrap:'wrap',alignItems:'center'}}>
              {Array.from({length:Math.min(cycles,20)}).map((_,i)=>(
                <div key={i} style={{height:5,flex:1,minWidth:10,maxWidth:26,borderRadius:3,overflow:'hidden',display:'flex'}}>
                  <div style={{flex:rhythm.inhale,background:`rgba(${th.rL},0.65)`}}/>
                  <div style={{flex:rhythm.hold,background:`rgba(${th.rD},0.38)`}}/>
                  <div style={{flex:rhythm.exhale,background:`rgba(${th.rL},0.48)`}}/>
                </div>
              ))}
              {showPartial && (
                <div style={{height:5,flex:1,minWidth:10,maxWidth:26,borderRadius:3,overflow:'hidden',display:'flex',opacity:0.32}}>
                  <div style={{flex:rhythm.inhale,background:`rgba(${th.rL},0.65)`}}/>
                  <div style={{flex:rhythm.hold,background:`rgba(${th.rD},0.38)`}}/>
                  <div style={{flex:rhythm.exhale,background:`rgba(${th.rL},0.48)`}}/>
                </div>
              )}
              {cycles > 20 && (
                <div style={{fontSize:9,color:'rgba(232,237,228,0.28)',fontFamily:'"JetBrains Mono",monospace',marginLeft:2}}>+{cycles-20}</div>
              )}
            </div>
          </div>
        )}

        {/* Return button */}
        <button onClick={onDone} style={{marginTop:18,width:'100%',height:58,borderRadius:999,border:`1px solid rgba(${th.rBd},0.28)`,background:`linear-gradient(180deg,rgba(${th.rL},0.17) 0%,rgba(${th.rD},0.22) 100%)`,backdropFilter:'blur(8px)',color:'#F3F7ED',fontSize:16,fontWeight:400,letterSpacing:'0.08em',cursor:'pointer',fontFamily:'"Noto Sans SC",system-ui,sans-serif'}}>
          回到首页
        </button>
      </div>
    </div>
  );
}
window.SummaryScreen=SummaryScreen;
</script>

<script type="text/babel">
const ALL_THERAPIES = [

function TherapyScreen({ onBack, onSelectTherapy }) {
  const th = useTheme();
  const [hasBg, setHasBg] = React.useState((window.__BG||'default')!=='default');
  const [bgBright, setBgBright] = React.useState(window.__GROWTH.bgBright??40);
  React.useEffect(()=>{
    const h=()=>setHasBg((window.__BG||'default')!=='default');
    window.addEventListener('bg-updated',h); return()=>window.removeEventListener('bg-updated',h);
  },[]);
  React.useEffect(()=>{
    const h=()=>setBgBright(window.__GROWTH.bgBright??40);
    window.addEventListener('growth-updated',h); return()=>window.removeEventListener('growth-updated',h);
  },[]);
  const three = React.useMemo(() => {
    // 正念疗法始终出现，另外随机抽 2 个
    const mindful = ALL_THERAPIES.find(t=>t.id==='mindful');
    const rest = ALL_THERAPIES.filter(t=>t.id!=='mindful');
    for(let i=0;i<2;i++){ const j=i+Math.floor(Math.random()*(rest.length-i)); [rest[i],rest[j]]=[rest[j],rest[i]]; }
    const arr = [mindful, ...rest.slice(0,2)];
    for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
    return arr;
  }, []);

  return (
    <div style={{position:'absolute',inset:0,background:hasBg?'transparent':'linear-gradient(180deg,#1F2A24 0%,#0E1613 100%)',color:'#E8EDE4',display:'flex',flexDirection:'column',fontFamily:'"Noto Sans SC",system-ui,sans-serif'}}>
      <BgLayer brightness={bgBright/100}/>
      <NoiseOverlay intensity={0.2}/>
      <div style={{position:'absolute',top:'30%',left:'50%',transform:'translate(-50%,-50%)',width:380,height:380,borderRadius:'50%',background:`radial-gradient(circle,rgba(${th.r},0.12) 0%,transparent 70%)`,filter:'blur(25px)',pointerEvents:'none'}}/>

      {/* Header */}
      <div style={{position:'relative',zIndex:2,padding:'64px 24px 0',display:'flex',alignItems:'center',gap:14}}>
        <button onClick={onBack} style={{background:'rgba(232,237,228,0.06)',border:'1px solid rgba(232,237,228,0.12)',borderRadius:999,padding:'8px 14px',color:'rgba(232,237,228,0.75)',fontSize:12,cursor:'pointer',backdropFilter:'blur(8px)',display:'flex',alignItems:'center',gap:6,fontFamily:'"Noto Sans SC",system-ui,sans-serif'}}>
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M15 18l-6-6 6-6"/></svg>返回
        </button>
        <div>
          <div style={{fontFamily:'"Noto Serif SC",serif',fontSize:17,fontWeight:300,letterSpacing:'0.04em'}}>综合疗法</div>
          <div style={{fontSize:10,fontFamily:'"JetBrains Mono",monospace',letterSpacing:'0.18em',color:`rgba(${th.rL},0.5)`,marginTop:3,textTransform:'uppercase'}}>今日推荐 · 随机组合</div>
        </div>
      </div>

      {/* Cards */}
      <div style={{position:'relative',zIndex:2,flex:1,padding:'0 24px',display:'flex',flexDirection:'column',gap:12,justifyContent:'center'}}>
        {three.map((t,i)=>(
          <div key={t.id}
            onClick={t.id==='mindful'&&onSelectTherapy?()=>onSelectTherapy(t.id):undefined}
            style={{
              display:'flex',alignItems:'center',gap:16,padding:'20px',borderRadius:18,
              background:t.id==='mindful'?`rgba(${th.r},0.11)`:`rgba(${th.r},0.07)`,
              border:t.id==='mindful'?`1px solid rgba(${th.rL},0.28)`:`1px solid rgba(${th.rL},0.13)`,
              backdropFilter:'blur(8px)',
              animation:`cardUp 0.45s ease-out ${i*0.09}s both`,
              cursor:t.id==='mindful'?'pointer':'default',
            }}>
            <div style={{width:48,height:48,borderRadius:14,background:`rgba(${th.rL},0.09)`,border:`1px solid rgba(${th.rL},0.16)`,display:'flex',alignItems:'center',justifyContent:'center',color:`rgba(${th.rL},0.8)`,flexShrink:0}}>
              <TherapyIcon id={t.id}/>
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:15,fontWeight:400,color:'#F0F3EA',letterSpacing:'0.02em'}}>{COPY(`therapy.${t.id}.name`)}</div>
              <div style={{fontSize:11.5,color:'rgba(232,237,228,0.42)',marginTop:4,lineHeight:1.5,fontWeight:300}}>{COPY(`therapy.${t.id}.sub`)}</div>
            </div>
            {t.id==='mindful'?(
              <div style={{flexShrink:0,width:32,height:32,borderRadius:10,background:`rgba(${th.rL},0.14)`,border:`1px solid rgba(${th.rL},0.28)`,display:'flex',alignItems:'center',justifyContent:'center',color:`rgba(${th.rL},0.85)`}}>
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
              </div>
            ):(
              <div style={{flexShrink:0,fontSize:9.5,letterSpacing:'0.1em',color:`rgba(${th.rL},0.38)`,fontFamily:'"JetBrains Mono",monospace',background:`rgba(${th.rL},0.06)`,border:`1px solid rgba(${th.rL},0.13)`,borderRadius:6,padding:'3px 8px',textTransform:'uppercase',whiteSpace:'nowrap'}}>
                即将推出
              </div>

          </div>
        ))}
      </div>

      {/* Footer */}
      <div style={{position:'relative',zIndex:2,padding:'0 24px 48px',textAlign:'center'}}>
        <div style={{fontSize:9.5,letterSpacing:'0.16em',color:'rgba(232,237,228,0.18)',fontFamily:'"JetBrains Mono",monospace',textTransform:'uppercase'}}>每次打开重新随机推荐</div>
      </div>
    </div>
  );
}
window.TherapyScreen=TherapyScreen;
</script>

<!-- ── Mindfulness (5-4-3-2-1 Grounding) ────────────────── -->
<script type="text/babel">
const SENSE_DATA=[
  {id:'see',  label:'看', cnt:5, rgb:'158,210,172',
   dots:[{x:22,y:82},{x:88,y:32},{x:152,y:32},{x:218,y:82},{x:120,y:120}],
   segs:[[0,1],[1,2],[2,3],[3,4],[4,0]]},
  {id:'feel', label:'触', cnt:4, rgb:'220,188,128',
   dots:[{x:120,y:16},{x:218,y:90},{x:120,y:164},{x:22,y:90}],
   segs:[[0,1],[1,2],[2,3],[3,0]]},
  {id:'hear', label:'听', cnt:3, rgb:'128,190,218',
   dots:[{x:30,y:155},{x:120,y:18},{x:210,y:155}],
   segs:[[0,1],[1,2],[2,0]]},
  {id:'smell',label:'闻', cnt:2, rgb:'195,155,215',
   dots:[{x:68,y:90},{x:172,y:90}],
   segs:[[0,1]]},
  {id:'taste',label:'尝', cnt:1, rgb:'218,168,130',
   dots:[{x:120,y:90}],
   segs:[]},
];
const CONF_COLORS=['#9ED4AC','#DCBA72','#C4A8D4','#84BCCC','#F0DE8C','#B4D8BE','#D4AC84','#98CCBE','#E8C498','#A8CCAC'];

function ConfettiBlast({trigger,active}){
  const cvRef=React.useRef(null);
  React.useEffect(()=>{
    if(!active)return;
    const cv=cvRef.current; if(!cv)return;
    const dpr=window.devicePixelRatio||1;
    const W=cv.clientWidth||window.innerWidth, H=cv.clientHeight||window.innerHeight;
    cv.width=W*dpr; cv.height=H*dpr;
    const ctx=cv.getContext('2d'); ctx.scale(dpr,dpr);
    const cx=W/2, cy=H*0.45;
    const ps=Array.from({length:72},(_,i)=>{
      const ang=(i/72)*Math.PI*2+(Math.random()-0.5)*0.6;
      const spd=4+Math.random()*9;
      const w=Math.random()>0.45?4+Math.random()*4:9+Math.random()*10;
      return{x:cx,y:cy,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd-5-Math.random()*5,
        rot:Math.random()*360,rotSpd:(Math.random()-0.5)*10,
        color:CONF_COLORS[i%CONF_COLORS.length],
        w,h:Math.random()>0.45?w:3+Math.random()*2,circle:Math.random()>0.55,
        life:1,decay:0.006+Math.random()*0.005};
    });
    let rafId;
    function tick(){
      ctx.clearRect(0,0,W,H); let alive=false;
      for(const p of ps){
        if(p.life<=0)continue;
        p.vy+=0.32; p.vx*=0.988; p.vy*=0.993;
        p.x+=p.vx; p.y+=p.vy; p.rot+=p.rotSpd; p.life-=p.decay;
        if(p.life<=0)continue; alive=true;
        ctx.save();
        ctx.globalAlpha=Math.min(1,p.life*1.6);
        ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180);
        ctx.fillStyle=p.color;
        if(p.circle){ctx.beginPath();ctx.arc(0,0,p.w/2,0,Math.PI*2);ctx.fill();}
        else ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
        ctx.restore();
      }
      if(alive) rafId=requestAnimationFrame(tick);
    }
    rafId=requestAnimationFrame(tick);
    return()=>cancelAnimationFrame(rafId);
  },[trigger,active]);
  if(!active)return null;
  return <canvas ref={cvRef} style={{position:'absolute',inset:0,width:'100%',height:'100%',pointerEvents:'none',zIndex:90}}/>;
}

function ConstellationSVG({sense,litCount}){
  const{dots,segs,rgb,id}=sense;
  const litSegs=segs.filter(([a,b])=>a<litCount&&b<litCount);
  const ic={stroke:`rgba(${rgb},0.10)`,fill:'none',strokeWidth:'1.4',strokeLinecap:'round',strokeLinejoin:'round'};
  const senseIcons={
    /* 眼睛：杏仁外廓 + 虹膜 + 瞳孔 */
    see:(<g {...ic}>
      <path d="M 15,76 C 68,18 172,18 225,76 C 172,134 68,134 15,76"/>
      <circle cx="120" cy="76" r="40" fill={`rgba(${rgb},0.04)`} stroke={`rgba(${rgb},0.09)`}/>
      <circle cx="120" cy="76" r="17" fill={`rgba(${rgb},0.04)`} stroke={`rgba(${rgb},0.08)`}/>
      <path d="M 52,52 L 47,38 M 88,38 L 85,23 M 120,34 L 120,19 M 152,38 L 155,23 M 188,52 L 193,38" strokeWidth="1.1" stroke={`rgba(${rgb},0.07)`}/>
    </g>),
    /* 手：5 根手指 + 掌心轮廓 + 大拇指 */
    feel:(<g {...ic}>
      <path d="M 82,130 Q 62,122 52,106 Q 44,88 56,76 Q 70,64 84,80"/>
      <path d="M 86,118 L 90,52 Q 90,37 100,37 Q 110,37 110,52 L 110,118"/>
      <path d="M 110,115 L 114,20 Q 114,6 124,6 Q 134,6 134,20 L 134,115"/>
      <path d="M 134,115 L 138,52 Q 138,37 148,37 Q 158,37 158,52 L 155,118"/>
      <path d="M 155,120 L 158,68 Q 160,54 170,56 Q 180,60 176,74 L 162,122"/>
      <path d="M 82,130 Q 80,148 88,158 Q 104,166 120,166 Q 136,166 152,158 Q 160,148 162,130"/>
    </g>),
    /* 耳朵：外耳廓 C 形 + 耳轮 + 对耳轮 + 耳道 + 耳垂 */
    hear:(<g {...ic}>
      <path d="M 100,16 C 158,16 182,48 182,89 C 182,130 158,162 100,162"/>
      <path d="M 100,162 Q 84,172 80,158 Q 78,142 92,136 L 100,162"/>
      <path d="M 110,36 C 152,36 168,60 168,89 C 168,118 152,142 110,142"/>
      <path d="M 100,58 C 136,58 148,72 144,96 C 140,118 122,130 100,128"/>
      <path d="M 92,136 Q 82,118 86,98 Q 90,80 104,78"/>
      <ellipse cx="118" cy="89" rx="12" ry="18" fill={`rgba(${rgb},0.04)`} stroke={`rgba(${rgb},0.08)`}/>
    </g>),
    /* 鼻子：鼻梁两侧 + 鼻底弧 + 鼻孔 + 鼻尖分隔 */
    smell:(<g {...ic}>
      <path d="M 108,12 Q 120,16 132,12"/>
      <path d="M 108,12 Q 100,50 96,89 Q 88,115 76,130"/>
      <path d="M 132,12 Q 140,50 144,89 Q 152,115 164,130"/>
      <path d="M 76,130 Q 80,150 96,160 Q 108,166 120,165 Q 132,166 144,160 Q 160,150 164,130"/>
      <path d="M 120,165 Q 118,153 108,149 Q 97,149 96,160"/>
      <path d="M 120,165 Q 122,153 132,149 Q 143,149 144,160"/>
    </g>),
    /* 嘴：上唇（含人中弧）+ 唇缝 + 下唇 */
    taste:(<g {...ic}>
      <path d="M 106,62 Q 120,50 134,62"/>
      <path d="M 40,82 Q 74,64 106,73 Q 120,79 134,73 Q 166,64 200,82"/>
      <path d="M 40,82 Q 74,96 106,89 Q 120,86 134,89 Q 166,96 200,82"/>
      <path d="M 40,82 Q 80,128 120,140 Q 160,128 200,82"/>
    </g>),
  };
  return(
    <svg viewBox="0 0 240 178" style={{width:'100%',maxWidth:230,display:'block',margin:'0 auto',overflow:'visible'}}>
      <defs>
        <filter id="mf-glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <filter id="mf-gs"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      {senseIcons[id]}
      {/* ghost lines */}
      {segs.map(([a,b],i)=>(
        <line key={`g${i}`} x1={dots[a].x} y1={dots[a].y} x2={dots[b].x} y2={dots[b].y}
          stroke={`rgba(${rgb},0.07)`} strokeWidth="1.5" strokeLinecap="round"/>
      ))}
      {/* lit lines */}
      {litSegs.map(([a,b],i)=>{
        const dx=dots[b].x-dots[a].x,dy=dots[b].y-dots[a].y;
        const len=Math.sqrt(dx*dx+dy*dy).toFixed(2);
        const isNew=i===litSegs.length-1;
        return(
          <line key={`l${a}-${b}`} x1={dots[a].x} y1={dots[a].y} x2={dots[b].x} y2={dots[b].y}
            stroke={`rgba(${rgb},0.78)`} strokeWidth="2" strokeLinecap="round"
            strokeDasharray={len}
            style={isNew?{'--llen':len,animation:'lineGrow 0.55s ease-out forwards'}:{strokeDashoffset:0}}/>
        );
      })}
      {/* dots */}
      {dots.map((d,i)=>{
        const lit=i<litCount, isNew=lit&&i===litCount-1;
        return(
          <g key={`d${i}`}>
            {lit&&<circle cx={d.x} cy={d.y} r={22} fill={`rgba(${rgb},0.09)`} filter="url(#mf-glow)"/>}
            <circle cx={d.x} cy={d.y} r={lit?8.5:4.5}
              fill={lit?`rgba(${rgb},0.95)`:`rgba(${rgb},0.18)`}
              filter={lit?'url(#mf-gs)':undefined}
              style={isNew?{transformOrigin:`${d.x}px ${d.y}px`,transformBox:'fill-box',animation:'dotPop 0.5s cubic-bezier(0.34,1.56,0.64,1)'}:undefined}/>
            <text x={d.x} y={d.y+16} textAnchor="middle"
              style={{fontFamily:'"JetBrains Mono",monospace',fontSize:'8px',
                fill:lit?`rgba(${rgb},0.5)`:`rgba(${rgb},0.14)`,transition:'fill 0.3s'}}>
              {i+1}
            </text>
          </g>
        );
      })}
    </svg>
  );
}
