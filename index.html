<script type="text/babel">
function _makeRNG(seed){ let s=seed; return()=>{s=(s*1664525+1013904223)>>>0;return s/4294967296;}; }

function buildSpiritTree(W,H,g,h){
  const rng=_makeRNG(97531);
  const branches=[],energyNodes=[],blossoms=[],roots=[],leaves=[];
  const groundY=H*0.80, baseX=W/2;
  const topLimit=H*0.07;
  const availH=groundY-topLimit;
  // Trunk length: 22–40% of available space (keeps tree contained)
  const trunkLen=availH*(0.22+g*0.18);
  const maxDepth=3+Math.floor(g*4); // 3–7 levels

  // pIdx = parent branch index (-1 for trunk); stored so sway can accumulate correctly
  function br(x,y,angle,len,w,depth,pIdx){
    if(depth>maxDepth||len<3.5)return;
    const ex=x+Math.sin(angle)*len, ey=y-Math.cos(angle)*len;
    if(ey<topLimit)return;
    const drift=(rng()-0.5)*len*0.28;
    const bIdx=branches.length;
    branches.push({x,y,ex,ey,
      cp1x:x+Math.sin(angle)*len*0.35+drift*0.6,cp1y:y-Math.cos(angle)*len*0.35,
      cp2x:ex-Math.sin(angle)*len*0.15+drift*0.4,cp2y:ey+Math.cos(angle)*len*0.15,
      w,depth,pIdx:pIdx??-1});
    if(depth>=maxDepth-1){
      energyNodes.push({x:ex,y:ey,r:1.4+rng()*1.2,branchIdx:bIdx});
      const lc=3+Math.floor(g*5);
      for(let l=0;l<lc;l++){
        const la=angle+(rng()-0.5)*2.2;
        const ll=4+rng()*10*g;
        leaves.push({bx:ex,by:ey,ox:Math.sin(la)*ll*0.5,oy:-Math.cos(la)*ll*0.5,angle:la,size:4+rng()*7*g,branchIdx:bIdx,frac:1});
      }
      if(g>0.5&&rng()<(g-0.5)*2.1) blossoms.push({x:ex,y:ey,size:3.5+rng()*4.5,branchIdx:bIdx});
      return;
    }
    const spread=0.50+(rng()-0.5)*0.06;
    const cl=len*(0.63+rng()*0.12), cw=w*0.65;
    br(ex,ey,angle-spread,cl,cw,depth+1,bIdx);
    br(ex,ey,angle+spread,cl,cw,depth+1,bIdx);
    if(depth<3&&rng()<0.42+g*0.48){
      br(ex,ey,angle+(rng()-0.5)*0.22,cl*0.73,cw*0.60,depth+1,bIdx);
    }
    if(g>0.45&&depth>=maxDepth-3){
      const frac=0.52+rng()*0.22;
      const mx=x+(ex-x)*frac, my=y+(ey-y)*frac;
      leaves.push({bx:mx,by:my,ox:0,oy:0,angle:angle+(rng()-0.5)*1.4,size:3.5+rng()*5*g,branchIdx:bIdx,frac});
    }
  }

  br(baseX,groundY,0,trunkLen,3.5+g*2.5,0,-1);

  // Roots — ALL from single base (baseX,groundY) for visual continuity with trunk
  const maxRD=Math.floor(h*3.8);
  function rt(x,y,angle,len,w,depth){
    if(depth>maxRD||len<4)return;
    const ex=x+Math.sin(angle)*len, ey=y+Math.cos(angle)*len;
    if(ey>H*0.97)return;
    roots.push({x,y,ex,ey,
      cp1x:x+Math.sin(angle)*len*0.4+(rng()-0.5)*len*0.28,cp1y:y+Math.cos(angle)*len*0.4,
      cp2x:ex,cp2y:ey-len*0.06,w});
    rt(ex,ey,angle-0.40-rng()*0.18,len*0.62,w*0.68,depth+1);
    rt(ex,ey,angle+0.40+rng()*0.18,len*0.62,w*0.68,depth+1);
  }
  const rl=18+h*30, rw=2.0+h*1.5;
  rt(baseX,groundY,0.40,rl,rw,0);
  rt(baseX,groundY,-0.40,rl,rw,0);
  if(h>0.25){ rt(baseX,groundY,0.72,rl*0.70,rw*0.72,0); rt(baseX,groundY,-0.72,rl*0.70,rw*0.72,0); }
  if(h>0.58){ rt(baseX,groundY,1.05,rl*0.44,rw*0.55,0); rt(baseX,groundY,-1.05,rl*0.44,rw*0.55,0); }

  return{branches,energyNodes,blossoms,roots,leaves,groundY,baseX};
}

function BlossomSVG({x,y,size}){
  return(
    <g>
      {[0,1,2,3,4].map(i=>{
        const a=(i/5)*Math.PI*2-Math.PI/2;
        const px=x+Math.cos(a)*size*0.52, py=y+Math.sin(a)*size*0.52;
        return(<ellipse key={i} cx={px} cy={py} rx={size*0.5} ry={size*0.26}
          transform={`rotate(${a*180/Math.PI+90},${px},${py})`}
          fill="rgba(255,215,228,0.48)" stroke="rgba(255,185,208,0.3)" strokeWidth="0.5"/>);
      })}
      <circle cx={x} cy={y} r={size*0.17} fill="rgba(255,238,155,0.88)"/>
    </g>
  );
}


function getTreeMessage(score){
  const i=score<0.10?0:score<0.22?1:score<0.36?2:score<0.50?3:score<0.64?4:score<0.76?5:score<0.90?6:7;
  return{main:COPY(`tree.s${i}.main`),sub:COPY(`tree.s${i}.sub`)};
}

function TreeScreen({onBack,growth,hrv}){
  const canvasRef=React.useRef(null);
  const branchMainRef=React.useRef(null);
  const glowRef=React.useRef(null);
  const leafGroupRef=React.useRef(null);
  const nodeGroupRef=React.useRef(null);
  // Sway params as live refs — updated by growth-updated event, read each RAF frame
  const swayAmpRef=React.useRef(window.__GROWTH.swayAmp??50);
  const swayFreqRef=React.useRef(window.__GROWTH.swayFreq??50);
  const clickBoostRef=React.useRef(window.__GROWTH.clickBoost??2);
  const clickImpulseRef=React.useRef(null); // {x,y,t} — SVG-space coords + performance.now()
  React.useEffect(()=>{
    const h=()=>{ swayAmpRef.current=window.__GROWTH.swayAmp??50; swayFreqRef.current=window.__GROWTH.swayFreq??50; clickBoostRef.current=window.__GROWTH.clickBoost??2; };
    window.addEventListener('growth-updated',h);
    return()=>window.removeEventListener('growth-updated',h);
  },[]);
  const SVG_W=402, SVG_H=550;
  const g=growth/100, h=hrv/100;
  const td=React.useMemo(()=>buildSpiritTree(SVG_W,SVG_H,g,h),[g,h]);
  const score=g*0.65+h*0.35;
  const msg=getTreeMessage(score);

  // ── Canvas: wisps + ground glow ─────────────────────────
  React.useEffect(()=>{
    const canvas=canvasRef.current; if(!canvas)return;
    const dpr=window.devicePixelRatio||1;
    canvas.width=SVG_W*dpr; canvas.height=SVG_H*dpr;
    canvas.style.width=SVG_W+'px'; canvas.style.height=SVG_H+'px';
    const ctx=canvas.getContext('2d'); ctx.scale(dpr,dpr);
    const wispN=6+Math.floor(g*18);
    const wisps=Array.from({length:wispN},()=>({
      x:td.baseX+(Math.random()-0.5)*90*g, y:td.groundY-Math.random()*td.groundY*0.8*(g+0.1),
      vx:(Math.random()-0.5)*0.22, vy:-0.12-Math.random()*0.28,
      r:0.7+Math.random()*1.6, op:0.15+Math.random()*0.35, life:Math.random()
    }));
    const pulses=[]; let lastPulse=0, t=0, rafId;
    function tick(){
      t++; ctx.clearRect(0,0,SVG_W,SVG_H);
      const gp=0.4+0.2*Math.sin(t/42);
      const grad=ctx.createRadialGradient(td.baseX,td.groundY+5,0,td.baseX,td.groundY+5,55+h*45);
      grad.addColorStop(0,`rgba(110,175,90,${(0.10+gp*0.07)*Math.max(h,0.05)})`);
      grad.addColorStop(1,'transparent');
      ctx.fillStyle=grad; ctx.fillRect(0,0,SVG_W,SVG_H);
      for(const w of wisps){
        w.life+=0.007; if(w.life>1){w.life=0;w.x=td.baseX+(Math.random()-0.5)*70*(g+0.1);w.y=td.groundY;w.vy=-0.12-Math.random()*0.28;}
        w.x+=w.vx+Math.sin(t/80+w.y*0.05)*0.18; w.y+=w.vy;
        const a=w.op*Math.sin(w.life*Math.PI)*(g+0.15);
        ctx.beginPath(); ctx.arc(w.x,w.y,w.r,0,Math.PI*2);
        ctx.fillStyle=`rgba(170,220,140,${a})`; ctx.fill();
      }
      if(t-lastPulse>90&&h>0.15&&td.roots.length&&Math.random()<h*0.7){
        const ro=td.roots[Math.floor(Math.random()*td.roots.length)];
        pulses.push({x:ro.ex,y:ro.ey,r:0,life:1});
        lastPulse=t;
      }
      for(let i=pulses.length-1;i>=0;i--){
        const p=pulses[i]; p.r+=0.45; p.life-=0.024;
        if(p.life<=0){pulses.splice(i,1);continue;}
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.strokeStyle=`rgba(130,195,110,${p.life*0.32*h})`; ctx.lineWidth=0.8; ctx.stroke();
      }
      rafId=requestAnimationFrame(tick);
    }
    rafId=requestAnimationFrame(tick);
    return()=>cancelAnimationFrame(rafId);
  },[g,h,td]);

  // ── Sway: direct DOM mutation, no React re-render ────────
  React.useEffect(()=>{
    let rafId, t=0;

    // Incremental sway added at each branch tip (accumulates root→tip)
    function swayInc(depth, bIdx, time, boost){
      const amp=(swayAmpRef.current/100)*80*boost; // incremental per level; total accumulates
      if(amp<0.02)return 0;
      const fBase=0.00016+(swayFreqRef.current/100)*0.0018;
      const fv=fBase+Math.sin(time*fBase*0.097)*fBase*0.20;
      const v1=Math.sin(time*fv       +bIdx*0.37)*0.62;
      const v2=Math.sin(time*fv*2.31  +bIdx*0.19)*0.24;
      const v3=Math.sin(time*fv*0.413         )*0.14;
      const ds=0.025+depth*0.048; // deeper branches add more per level
      return (v1+v2+v3)*ds*amp;
    }

    // makePath: start and end have separate displacements; CPs interpolate between them
    // plus an independent curvature bow so the branch flexes, not just translates
    function makePath(b, sDx, eDx, bow){
      const cp1Dx=sDx+(eDx-sDx)*0.35+bow;
      const cp2Dx=sDx+(eDx-sDx)*0.72+bow*0.55;
      return `M${(b.x+sDx).toFixed(2)},${b.y.toFixed(2)} C${(b.cp1x+cp1Dx).toFixed(2)},${b.cp1y.toFixed(2)} ${(b.cp2x+cp2Dx).toFixed(2)},${b.cp2y.toFixed(2)} ${(b.ex+eDx).toFixed(2)},${b.ey.toFixed(2)}`;
    }

    function tick(){
      t++;
      const bm=branchMainRef.current, bg=glowRef.current;
      const lg=leafGroupRef.current, ng=nodeGroupRef.current;
      if(!bm){ rafId=requestAnimationFrame(tick); return; }

      const fBase=0.00016+(swayFreqRef.current/100)*0.0018;
      const bowAmp=(swayAmpRef.current/100);

      // Accumulated end-point displacement per branch (root→tip order guaranteed by DFS)
      const endDx=new Float32Array(td.branches.length);
      const bmC=bm.children, bgC=bg?.children;

      // Click-impulse: sin starts at 0 → zero jump; oscillates then decays over 2.5s
      const ci=clickImpulseRef.current;
      const ciAgeMs=ci?performance.now()-ci.t:0;
      const ciDecay=ci?Math.max(0,1-ciAgeMs/2500):0;
      // sin(0)=0 at click moment → no positional jump on any branch/leaf
      const ciOsc=ciDecay>0?Math.sin(ciAgeMs*0.012):0;
      td.branches.forEach((b,i)=>{
        // Start of this branch = end of parent (or 0 for trunk) — guarantees continuity
        const sDx=b.pIdx>=0 ? endDx[b.pIdx] : 0;
        endDx[i]=sDx+swayInc(b.depth,i,t,1);
        // Add decaying oscillation impulse; accumulates root→tip like swayInc
        if(ci&&ciDecay>0){
          const dist=Math.sqrt((b.ex-ci.x)**2+(b.ey-ci.y)**2);
          const sf=Math.max(0,1-dist/130);
          if(sf>0) endDx[i]+=ciOsc*(clickBoostRef.current-1)*ciDecay*sf*(swayAmpRef.current/100)*60*(0.025+b.depth*0.048);
        }
        // Curvature bow: independent phase so branch actually flexes
        const bow=Math.sin(t*fBase*0.58+i*0.52+b.depth*0.85)*b.depth*1.2*bowAmp;
        const d=makePath(b,sDx,endDx[i],bow);
        if(bmC[i]) bmC[i].setAttribute('d',d);
        if(bgC?.[i]) bgC[i].setAttribute('d',d);
      });

      // Leaves follow their branch endpoint
      if(lg){
        const lgC=lg.children;
        td.leaves.forEach((l,i)=>{
          const eDx=(endDx[l.branchIdx]||0)*l.frac;
          const x=(l.bx+eDx+l.ox).toFixed(2);
          const y=(l.by+l.oy).toFixed(2);
          const r=(l.angle*180/Math.PI+eDx*0.7).toFixed(1);
          if(lgC[i]) lgC[i].setAttribute('transform',`translate(${x},${y}) rotate(${r})`);
        });
      }

      // Energy nodes follow their branch endpoint
      if(ng){
        const ngC=ng.children;
        td.energyNodes.forEach((n,i)=>{
          const dx=endDx[n.branchIdx]||0;
          if(ngC[i]) ngC[i].setAttribute('cx',(n.x+dx).toFixed(2));
        });
      }

      rafId=requestAnimationFrame(tick);
    }
    rafId=requestAnimationFrame(tick);
    return()=>cancelAnimationFrame(rafId);
  },[td]);

  const brStroke=(depth)=>{
    const t=depth/7;
    return `rgba(${Math.round(155+t*15)},${Math.round(200-t*35)},${Math.round(145-t*30)},${0.78-t*0.28})`;
  };

  return(
    <div style={{position:'absolute',inset:0,background:'linear-gradient(180deg,#090E08 0%,#060C07 100%)',color:'#E8EDE4',overflow:'hidden',display:'flex',flexDirection:'column'}}>
      <div style={{position:'absolute',top:'40%',left:'50%',transform:'translate(-50%,-50%)',width:450,height:450,borderRadius:'50%',background:`radial-gradient(circle,rgba(70,130,60,${0.04+g*0.08}) 0%,transparent 70%)`,pointerEvents:'none'}}/>
      <div style={{position:'relative',zIndex:10,padding:'62px 24px 0',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <button onClick={onBack} style={{background:'rgba(232,237,228,0.06)',border:'1px solid rgba(232,237,228,0.12)',borderRadius:999,padding:'8px 14px',color:'rgba(232,237,228,0.7)',fontSize:12,cursor:'pointer',backdropFilter:'blur(8px)',display:'flex',alignItems:'center',gap:6,fontFamily:'"Noto Sans SC",system-ui,sans-serif'}}>
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M15 18l-6-6 6-6"/></svg>返回
        </button>
        <div style={{fontFamily:'"Noto Serif SC",serif',fontSize:13,fontWeight:300,letterSpacing:'0.25em',color:'rgba(196,218,178,0.5)'}}>精 神 树</div>
        <div style={{width:68}}/>
      </div>
      <div style={{position:'relative',flex:1,overflow:'hidden'}}>
        <canvas ref={canvasRef} style={{position:'absolute',inset:0,pointerEvents:'none',zIndex:2}}/>
        <svg width={SVG_W} height={SVG_H} style={{position:'absolute',bottom:0,left:0,zIndex:1,cursor:'pointer'}}
          onClick={e=>{const r=e.currentTarget.getBoundingClientRect();clickImpulseRef.current={x:(e.clientX-r.left)*(SVG_W/r.width),y:(e.clientY-r.top)*(SVG_H/r.height),t:performance.now()};}}>
          <defs>
            <filter id="tglow" x="-60%" y="-60%" width="220%" height="220%">
              <feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <filter id="tnodeglow" x="-100%" y="-100%" width="300%" height="300%">
              <feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <filter id="trootglow" x="-40%" y="-40%" width="180%" height="180%">
              <feGaussianBlur stdDeviation="1.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
          <line x1={SVG_W*0.18} y1={td.groundY} x2={SVG_W*0.82} y2={td.groundY} stroke="rgba(130,175,115,0.14)" strokeWidth="1" strokeDasharray="2,7"/>
          {/* Roots — static, they don't sway */}
          <g filter="url(#trootglow)" opacity={0.4+h*0.4}>
            {td.roots.map((r,i)=>(
              <path key={i} d={`M${r.x},${r.y} C${r.cp1x},${r.cp1y} ${r.cp2x},${r.cp2y} ${r.ex},${r.ey}`}
                fill="none" stroke={`rgba(${70+Math.round(h*45)},${120+Math.round(h*35)},${65+Math.round(h*28)},${0.45+h*0.3})`}
                strokeWidth={r.w} strokeLinecap="round"/>
            ))}
          </g>
          {/* Glow layer — ref for sway DOM updates */}
          <g ref={glowRef} opacity="0.22" filter="url(#tglow)">
            {td.branches.map((b,i)=>(
              <path key={i} d={`M${b.x},${b.y} C${b.cp1x},${b.cp1y} ${b.cp2x},${b.cp2y} ${b.ex},${b.ey}`}
                fill="none" stroke="rgba(155,210,125,0.5)" strokeWidth={Math.max(0.8,b.w*1.5)} strokeLinecap="round"/>
            ))}
          </g>
          {/* Main branches — ref for sway DOM updates */}
          <g ref={branchMainRef}>
            {td.branches.map((b,i)=>(
              <path key={i} d={`M${b.x},${b.y} C${b.cp1x},${b.cp1y} ${b.cp2x},${b.cp2y} ${b.ex},${b.ey}`}
                fill="none" stroke={brStroke(b.depth)} strokeWidth={Math.max(0.5,b.w)} strokeLinecap="round"/>
            ))}
          </g>
          {/* Leaves — inline, ref for sway DOM updates */}
          <g ref={leafGroupRef}>
            {td.leaves.map((l,i)=>{
              const s=(l.size*0.52).toFixed(2);
              return(
                <path key={i}
                  d={`M0,${-s} Q${(l.size*0.52*0.48).toFixed(2)},0 0,${s} Q${(-l.size*0.52*0.48).toFixed(2)},0 0,${-s}Z`}
                  transform={`translate(${(l.bx+l.ox).toFixed(2)},${(l.by+l.oy).toFixed(2)}) rotate(${(l.angle*180/Math.PI).toFixed(1)})`}
                  fill="rgba(88,152,62,0.38)"
                  stroke="rgba(115,180,80,0.18)"
                  strokeWidth="0.35"
                />
              );
            })}
          </g>
          {/* Energy nodes — ref for sway DOM updates */}
          <g ref={nodeGroupRef} filter="url(#tnodeglow)">
            {td.energyNodes.map((n,i)=>(
              <circle key={i} cx={n.x} cy={n.y} r={n.r||1.8} fill="rgba(205,240,165,0.92)"/>
            ))}
          </g>
          {g>0.5&&td.blossoms.map((b,i)=>(<BlossomSVG key={i} x={b.x} y={b.y} size={b.size}/>))}
          <ellipse cx={td.baseX} cy={td.groundY} rx={10+h*8} ry={4} fill={`rgba(100,170,80,${0.06+h*0.1})`} filter="url(#tglow)"/>
        </svg>
      </div>
      <div style={{position:'relative',zIndex:5,padding:'18px 44px 14px',textAlign:'center'}}>
        <div style={{fontFamily:'"Noto Serif SC",serif',fontSize:17,fontWeight:300,color:'rgba(215,238,195,0.88)',letterSpacing:'0.1em',marginBottom:5}}>{msg.main}</div>
        <div style={{fontFamily:'"Noto Sans SC",system-ui,sans-serif',fontSize:11,color:'rgba(196,218,178,0.42)',letterSpacing:'0.06em',lineHeight:1.65}}>{msg.sub}</div>
      </div>
      <div style={{position:'relative',zIndex:5,padding:'0 32px 48px',display:'flex',justifyContent:'center',gap:48}}>
        {[{label:'冥想时长',value:`${growth}%`},{label:'HRV 水平',value:`${hrv}%`}].map(s=>(
          <div key={s.label} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
            <div style={{fontFamily:'"JetBrains Mono",monospace',fontSize:22,fontWeight:200,color:'rgba(196,218,178,0.78)'}}>{s.value}</div>
            <div style={{fontFamily:'"Noto Sans SC",system-ui',fontSize:9.5,color:'rgba(196,218,178,0.28)',letterSpacing:'0.14em'}}>{s.label}</div>
          </div>
        ))}
      </div>
    </div>
  );
}
window.TreeScreen=TreeScreen;

function DevPanel({open,onClose,onResetGuide}){
  const [time,setTime]=React.useState(window.__GROWTH.time);
  const [hrv,setHrv]=React.useState(window.__GROWTH.hrv);
  const [swayAmp,setSwayAmp]=React.useState(window.__GROWTH.swayAmp??50);
  const [swayFreq,setSwayFreq]=React.useState(window.__GROWTH.swayFreq??50);
  const [bgBright,setBgBright]=React.useState(window.__GROWTH.bgBright??40);
  const [bgBrightEx,setBgBrightEx]=React.useState(window.__GROWTH.bgBrightExhale??60);
  const [clickBoost,setClickBoost]=React.useState(window.__GROWTH.clickBoost??2);
  React.useEffect(()=>{
    if(open){
      setTime(window.__GROWTH.time); setHrv(window.__GROWTH.hrv);
      setSwayAmp(window.__GROWTH.swayAmp??50); setSwayFreq(window.__GROWTH.swayFreq??50);
      setBgBright(window.__GROWTH.bgBright??40); setBgBrightEx(window.__GROWTH.bgBrightExhale??60);
      setClickBoost(window.__GROWTH.clickBoost??2);
    }
  },[open]);
  const apply=(t,h,sa,sf,bb,bbe,cb)=>window.saveGrowth({time:t,hrv:h,swayAmp:sa,swayFreq:sf,bgBright:bb,bgBrightExhale:bbe,clickBoost:cb});
  if(!open)return null;
  return(
    <div style={{position:'absolute',inset:0,zIndex:200,display:'flex',flexDirection:'column',justifyContent:'flex-end'}}>
      <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.55)'}}/>
      <div style={{position:'relative',background:'#111A10',borderRadius:'22px 22px 0 0',border:'1px solid rgba(196,218,178,0.1)',padding:'26px 26px 52px',display:'flex',flexDirection:'column',gap:20}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{fontFamily:'"JetBrains Mono",monospace',fontSize:10,letterSpacing:'0.22em',color:'rgba(196,218,178,0.35)',textTransform:'uppercase'}}>Developer</div>
          <button onClick={onClose} style={{background:'none',border:'none',color:'rgba(196,218,178,0.35)',cursor:'pointer',fontSize:20,lineHeight:1,padding:'0 4px'}}>×</button>
        </div>
        {[
          {label:'冥想时长',val:time,set:v=>{setTime(v);apply(v,hrv,swayAmp,swayFreq,bgBright,bgBrightEx,clickBoost);},lo:'树苗',hi:'繁花'},
          {label:'HRV 心率变异',val:hrv,set:v=>{setHrv(v);apply(time,v,swayAmp,swayFreq,bgBright,bgBrightEx,clickBoost);},lo:'不稳定',hi:'高度活跃'},
          {label:'摇曳幅度',val:swayAmp,set:v=>{setSwayAmp(v);apply(time,hrv,v,swayFreq,bgBright,bgBrightEx,clickBoost);},lo:'静止',hi:'飘逸'},
          {label:'摇曳频率',val:swayFreq,set:v=>{setSwayFreq(v);apply(time,hrv,swayAmp,v,bgBright,bgBrightEx,clickBoost);},lo:'缓慢',hi:'轻快'},
          {label:'背景亮度(正常)',val:bgBright,set:v=>{setBgBright(v);apply(time,hrv,swayAmp,swayFreq,v,bgBrightEx,clickBoost);},lo:'10',hi:'80'},
          {label:'背景亮度(呼气)',val:bgBrightEx,set:v=>{setBgBrightEx(v);apply(time,hrv,swayAmp,swayFreq,bgBright,v,clickBoost);},lo:'10',hi:'90'},
          {label:'点击摇曳增幅',val:clickBoost,set:v=>{setClickBoost(v);apply(time,hrv,swayAmp,swayFreq,bgBright,bgBrightEx,v);},lo:'1x',hi:'5x',min:1,max:5,step:0.1,fmt:v=>v.toFixed(1)+'x'},
        ].map(s=>(
          <div key={s.label}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
              <span style={{fontFamily:'"Noto Sans SC",system-ui',fontSize:12,color:'rgba(232,237,228,0.6)'}}>{s.label}</span>
              <span style={{fontFamily:'"JetBrains Mono",monospace',fontSize:12,color:'rgba(196,218,178,0.65)'}}>{s.fmt?s.fmt(s.val):s.val}</span>
            </div>
            <input type="range" min={s.min??0} max={s.max??100} step={s.step??1} value={s.val} onChange={e=>s.set(+e.target.value)} style={{width:'100%',accentColor:'rgba(174,199,158,0.75)',cursor:'pointer'}}/>
            <div style={{display:'flex',justifyContent:'space-between',marginTop:3}}>
              <span style={{fontSize:9,color:'rgba(196,218,178,0.22)',fontFamily:'"JetBrains Mono",monospace'}}>{s.lo}</span>
              <span style={{fontSize:9,color:'rgba(196,218,178,0.22)',fontFamily:'"JetBrains Mono",monospace'}}>{s.hi}</span>
            </div>
          </div>
        ))}
        <button onClick={onResetGuide} style={{background:'rgba(232,237,228,0.04)',border:'1px solid rgba(232,237,228,0.1)',borderRadius:10,padding:'11px',color:'rgba(232,237,228,0.35)',fontSize:12,cursor:'pointer',fontFamily:'"Noto Sans SC",system-ui',letterSpacing:'0.05em',marginTop:2}}>
          重置引导流程
        </button>
      </div>
    </div>
  );
}
window.DevPanel=DevPanel;
</script>

<script type="text/babel">
// Theme palettes — muted, sophisticated
// r=base, rL=light, rD=mid-dark, rDk=darkest, rBd=border
const THEMES={
  default:{r:'139,174,144',rL:'174,199,158',rD:'122,155,116',rDk:'74,102,78', rBd:'222,232,202'},
  bamboo: {r:'139,174,144',rL:'174,199,158',rD:'122,155,116',rDk:'74,102,78', rBd:'222,232,202'},
  house:  {r:'176,112,96', rL:'210,152,132',rD:'148,88,72',  rDk:'100,58,46', rBd:'228,195,182'},
  lotus:  {r:'196,144,152',rL:'220,174,180',rD:'164,116,126',rDk:'118,76,88', rBd:'228,200,206'},
  temple: {r:'144,144,168',rL:'174,174,200',rD:'118,118,145',rDk:'78,78,108', rBd:'208,208,230'},
};
window.getTheme=function(){ return THEMES[window.__BG||'default']||THEMES.default; };
function applyThemeCSSVars(){
  const th=window.getTheme();
  document.documentElement.style.setProperty('--tc-rL',th.rL);
  document.documentElement.style.setProperty('--tc-rBd',th.rBd);
}
applyThemeCSSVars();
window.addEventListener('bg-updated',applyThemeCSSVars);

const BG_OPTIONS=[
  {id:'default',label:'默认',img:null},
  {id:'house',  label:'壁炉',img:'background/house.jpg'},
  {id:'bamboo', label:'竹林',img:'background/bamboo.jpg'},
  {id:'temple', label:'寺庙',img:'background/temple.jpg'},
  {id:'lotus',  label:'荷塘',img:'background/lotus.jpg'},
];

function useTheme(){
  const [t,setT]=React.useState(window.getTheme());
  React.useEffect(()=>{
    const h=()=>setT(window.getTheme());
    window.addEventListener('bg-updated',h);
    return()=>window.removeEventListener('bg-updated',h);
  },[]);
  return t;
}
window.useTheme=useTheme;

function BgLayer({brightness, transitionMs=800}){
  const [bg,setBg]=React.useState(window.__BG||'default');
  React.useEffect(()=>{
    const h=()=>setBg(window.__BG||'default');
    window.addEventListener('bg-updated',h);
    return()=>window.removeEventListener('bg-updated',h);
  },[]);
  const opt=BG_OPTIONS.find(o=>o.id===bg)||BG_OPTIONS[0];
  if(!opt.img)return null;
  return(
    <div style={{position:'absolute',inset:0,zIndex:0,pointerEvents:'none'}}>
      <img src={opt.img} style={{position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'cover',filter:`brightness(${brightness})`,transition:`filter ${transitionMs}ms ease`}}/>
      <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.28)'}}/>
    </div>
  );
}
window.BgLayer=BgLayer;

function BgPickerScreen({onBack}){

          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M15 18l-6-6 6-6"/></svg>返回
        </button>

              <span style={{fontFamily:'"Noto Serif SC",serif',fontSize:15,fontWeight:400,color:'rgba(243,247,237,0.92)',letterSpacing:'0.05em'}}>{opt.label}</span>
              {sel===opt.id&&(
                <div style={{width:22,height:22,borderRadius:'50%',background:`rgba(${th.rL},0.88)`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                  <svg width="10" height="8" viewBox="0 0 10 8" fill="none" stroke="#1A2018" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 4l3 3 5-6"/></svg>
                </div>
              )}

          </div>
        ))}
      </div>

  );
}
window.BgPickerScreen=BgPickerScreen;
</script>

<!-- ── App root ───────────────────────────────────────────── -->
<script type="text/babel">
function App() {
  const ONBOARDED_KEY = 'zenflow:onboarded:v1';
  const hasOnboarded = (()=>{ try{return localStorage.getItem(ONBOARDED_KEY)==='1';}catch(e){return false;} })();
  const [route, setRoute] = React.useState(hasOnboarded ? 'home' : 'guide');
  const [twVer, setTwVer] = React.useState(0);
  const [copyVer, setCopyVer] = React.useState(0);
  const [devOpen, setDevOpen] = React.useState(false);
  const [growth, setGrowth] = React.useState({...window.__GROWTH});
  const [sessionData, setSessionData] = React.useState(null);

  React.useEffect(()=>{
    const h=()=>setTwVer(v=>v+1);
    window.addEventListener('tweaks-updated',h);
    return()=>window.removeEventListener('tweaks-updated',h);
  },[]);

  React.useEffect(()=>{
    const h=()=>setCopyVer(v=>v+1);
    window.addEventListener('copy-updated',h);
    // Auto-fetch copy.xlsx after React mounts (avoids race with Babel compile)
    fetch('./copy.xlsx')
      .then(r=>{ console.log('[copy] fetch status:', r.status, r.url); return r.ok?r.arrayBuffer():null; })
      .catch(e=>{ console.warn('[copy] fetch failed (file:// protocol? server not running?):', e); return null; })
      .then(buf=>{
        if(!buf){ console.warn('[copy] no buffer, skipping'); return; }
        try{
          const copy=window.parseCopyExcel(buf);
          console.log('[copy] loaded keys:', Object.keys(copy).length, Object.keys(copy).slice(0,3));
          if(Object.keys(copy).length>0){window.APP_COPY=copy;setCopyVer(v=>v+1);}
        }catch(e){console.warn('[copy] parse error',e);}
      });
    return()=>window.removeEventListener('copy-updated',h);
  },[]);

  React.useEffect(()=>{
    const h=()=>setGrowth({...window.__GROWTH});
    window.addEventListener('growth-updated',h);
    return()=>window.removeEventListener('growth-updated',h);
  },[]);

  const completeGuide = (answers) => {
    try{
      localStorage.setItem(ONBOARDED_KEY,'1');
      localStorage.setItem('zenflow:onboarding',JSON.stringify(answers||{}));
    }catch(e){}
    // Go to onboarding breathing screen, NOT home
    setRoute('onboarding-breath');
  };

  const rhythm = { inhale:window.__TWEAKS.inhale, hold:window.__TWEAKS.hold, exhale:window.__TWEAKS.exhale };

  return (
    <IOSDevice width={402} height={874} dark={true}>
      <div style={{position:'relative',width:'100%',height:'100%'}}>
        {route==='guide' && <Guide onComplete={completeGuide}/>}
        {route==='onboarding-breath' && (
          <OnboardingBreathScreen
            onComplete={()=>setRoute('home')}
          />
        )}
        {route==='home' && (
          <HomeScreen
            onGetHelp={()=>setRoute('help')}
            onSettings={()=>setRoute('settings')}
            onTree={()=>setRoute('tree')}
            onDev={()=>setDevOpen(true)}
            onBgPicker={()=>setRoute('bg-picker')}
            onTherapy={()=>setRoute('therapy')}
          />
        )}
        {route==='therapy' && (
          <TherapyScreen
            onBack={()=>setRoute('home')}
            onSelectTherapy={(id)=>{ if(id==='mindful') setRoute('mindfulness'); }}
          />
        )}
        {route==='mindfulness' && (
          <MindfulnessScreen onBack={()=>setRoute('therapy')} onDone={()=>setRoute('home')}/>
        )}
        {route==='bg-picker' && (
          <BgPickerScreen onBack={()=>setRoute('home')}/>
        )}
        {route==='help' && (
          <HelpScreen
            key={'help-'+twVer}
            onExit={(data)=>{ setSessionData(data); setRoute('summary'); }}
            rhythm={rhythm}
            noise={window.__TWEAKS.noise}
          />
        )}
        {route==='summary' && sessionData && (
          <SummaryScreen data={sessionData} onDone={()=>setRoute('home')}/>
        )}
        {route==='settings' && (
          <SettingsScreen onBack={()=>setRoute('home')}/>
        )}
        {route==='tree' && (
          <TreeScreen
            key={'tree-'+growth.time+'-'+growth.hrv}
            onBack={()=>setRoute('home')}
            growth={growth.time}
            hrv={growth.hrv}
          />
        )}
        {route==='home' && (
          <DevPanel
            open={devOpen}
            onClose={()=>setDevOpen(false)}
            onResetGuide={()=>{
              try{localStorage.removeItem(ONBOARDED_KEY);}catch(e){}
              setDevOpen(false);
              setRoute('guide');
            }}
          />
        )}
      </div>
    </IOSDevice>
  );
}
ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>

<!-- ── BGM + Tweaks wiring ───────────────────────────────── -->
<script>
let audioCtx, masterGain, bgmStarted=false, arpTimer=null;

function buildReverbIR(ctx,sec,decay){
  const r=ctx.sampleRate,len=r*sec,ir=ctx.createBuffer(2,len,r);
  for(let c=0;c<2;c++){const d=ir.getChannelData(c);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,decay);}
  return ir;
}
function startBGM(){
  if(bgmStarted)return; bgmStarted=true;
  try{
    audioCtx=audioCtx||new(window.AudioContext||window.webkitAudioContext)();
    masterGain=audioCtx.createGain(); masterGain.gain.value=window.__TWEAKS.noise?0.55:0;
    const lp=audioCtx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=1800; lp.Q.value=0.4;
    const conv=audioCtx.createConvolver(); conv.buffer=buildReverbIR(audioCtx,3.6,2.2);
    const wet=audioCtx.createGain(); wet.gain.value=0.55;
    const dry=audioCtx.createGain(); dry.gain.value=0.7;
    masterGain.connect(lp); lp.connect(dry).connect(audioCtx.destination); lp.connect(conv).connect(wet).connect(audioCtx.destination);
    [65.41,98.00,130.81].forEach((f,i)=>{
      const osc=audioCtx.createOscillator(); osc.type=i<2?'sine':'triangle'; osc.frequency.value=f;
      const g=audioCtx.createGain(); g.gain.value=0; g.gain.linearRampToValueAtTime(0.12-i*0.02,audioCtx.currentTime+4);
      const lfo=audioCtx.createOscillator(); lfo.frequency.value=0.05+i*0.03;
      const lg=audioCtx.createGain(); lg.gain.value=0.6+i*0.3;
      lfo.connect(lg).connect(osc.detune); osc.connect(g).connect(masterGain); osc.start(); lfo.start();
    });
    const arpF=[523.25,659.25,783.99,880.00,1046.50]; let arpIdx=0;
    const playArp=()=>{
      if(!audioCtx||audioCtx.state==='closed')return;
      const now=audioCtx.currentTime,f=arpF[arpIdx%arpF.length];
      if(Math.random()>0.25){
        const o=audioCtx.createOscillator(); o.type='sine'; o.frequency.value=f;
        const g=audioCtx.createGain(); g.gain.setValueAtTime(0,now); g.gain.linearRampToValueAtTime(0.055,now+0.4); g.gain.exponentialRampToValueAtTime(0.0001,now+4.5);
        o.connect(g).connect(masterGain); o.start(now); o.stop(now+4.8);
      }
      arpIdx+=1+Math.floor(Math.random()*2);
    };
    const schedArp=()=>{playArp();arpTimer=setTimeout(schedArp,3200+Math.random()*2300);};
    arpTimer=setTimeout(schedArp,2000);
  }catch(e){console.warn('Audio unavailable',e);}
}
function setBGM(on){
  if(!masterGain)return;
  masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
  masterGain.gain.linearRampToValueAtTime(on?0.55:0,audioCtx.currentTime+0.8);
}
['click','touchstart','keydown'].forEach(ev=>{
  window.addEventListener(ev,function once(){startBGM();window.removeEventListener(ev,once);},{once:true});
});

// Tweaks panel wiring (with exhale ≥ inhale+2 constraint)
const panel=document.getElementById('tweaks');
const toggleBtn=document.getElementById('tweaks-toggle-btn');
const inhaleEl=document.getElementById('tw-inhale');
const holdEl=document.getElementById('tw-hold');
const exhaleEl=document.getElementById('tw-exhale');
const inhaleV=document.getElementById('tw-inhale-v');
const holdV=document.getElementById('tw-hold-v');
const exhaleV=document.getElementById('tw-exhale-v');
const noiseBtn=document.getElementById('tw-noise');
const noiseV=document.getElementById('tw-noise-v');
const presetLbl=document.getElementById('tw-preset-label');
const presetBtns=document.querySelectorAll('.tw-preset');
const constraintNote=document.getElementById('tw-constraint-note');

const PRESETS={'4-7-8':[4,7,8],'4-4-4':[4,4,4],'4-2-6':[4,2,6]};

toggleBtn.addEventListener('click',()=>{
  panel.classList.toggle('active');
  toggleBtn.style.display=panel.classList.contains('active')?'none':'block';
});

function hydrateUI(){
  inhaleEl.value=window.__TWEAKS.inhale; holdEl.value=window.__TWEAKS.hold; exhaleEl.value=window.__TWEAKS.exhale;
  inhaleV.textContent=window.__TWEAKS.inhale; holdV.textContent=window.__TWEAKS.hold; exhaleV.textContent=window.__TWEAKS.exhale;
  noiseV.textContent=window.__TWEAKS.noise?'ON':'OFF';
  matchPreset();
}
function matchPreset(){
  const key=[window.__TWEAKS.inhale,window.__TWEAKS.hold,window.__TWEAKS.exhale].join('-');
  let matched='custom';
  Object.entries(PRESETS).forEach(([k,v])=>{if(v.join('-')===key)matched=k;});
  presetLbl.textContent=matched==='custom'?'自定义':matched;
  presetBtns.forEach(b=>b.classList.toggle('active',b.dataset.preset===matched));
}
function pushEdits(edits){
  // Enforce exhale >= inhale + 2
  const i=edits.inhale!==undefined?edits.inhale:window.__TWEAKS.inhale;
  const e=edits.exhale!==undefined?edits.exhale:window.__TWEAKS.exhale;
  const safeE=Math.max(e,i+2);
  if(safeE!==e){
    edits.exhale=safeE;
    constraintNote.style.color='rgba(220,175,80,0.85)';
    constraintNote.textContent='⚠ 已自动调整：呼气必须比吸气长至少 2 秒';
    setTimeout(()=>{constraintNote.style.color='rgba(220,175,80,0.55)';constraintNote.textContent='规则：呼气必须比吸气长至少 2 秒';},2500);
  }
  Object.assign(window.__TWEAKS,edits);
  hydrateUI();
  window.dispatchEvent(new Event('tweaks-updated'));
}

inhaleEl.addEventListener('input',()=>pushEdits({inhale:+inhaleEl.value}));
holdEl.addEventListener('input',()=>pushEdits({hold:+holdEl.value}));
exhaleEl.addEventListener('input',()=>pushEdits({exhale:+exhaleEl.value}));
noiseBtn.addEventListener('click',()=>{const on=!window.__TWEAKS.noise;pushEdits({noise:on});setBGM(on);if(on)startBGM();});
presetBtns.forEach(b=>{
  b.addEventListener('click',()=>{
    const k=b.dataset.preset; if(k==='custom')return;
    const[i,h,e]=PRESETS[k]; pushEdits({inhale:i,hold:h,exhale:e});
  });
});
hydrateUI();

// ── Click ripple effect ───────────────────────────────────────────────────────
document.addEventListener('click', function(e) {
  const r = document.createElement('div');
  r.className = 'click-ripple';
  r.style.left = (e.clientX - 18) + 'px';
  r.style.top  = (e.clientY - 18) + 'px';
  document.body.appendChild(r);
  r.addEventListener('animationend', () => r.remove());
});
</script>
